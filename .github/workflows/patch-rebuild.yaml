name: Weekly Patch Rebuild

# Rebuilds and pushes :latest every Sunday at 03:00 UTC so that
# apk upgrade in the Dockerfile picks up the latest Alpine OS security patches
# (zlib, openssl, busybox, etc.) without requiring a code change.

on:
  schedule:
    - cron: '0 3 * * 0'   # every Sunday 03:00 UTC
  workflow_dispatch:

env:
  IMAGE: opsmode/k8s-janus

jobs:
  rebuild:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Rebuild and push :latest (no-cache — picks up OS patches)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          no-cache: true
          platforms: linux/amd64
