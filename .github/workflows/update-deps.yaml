name: Update Dependencies

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade controller dependencies
        run: |
          pip install --quiet pip-tools
          # Strip pins, upgrade all, re-freeze in place
          sed 's/==.*//' controller/requirements.txt | sort -u > /tmp/ctrl.in
          xargs pip install --quiet < /tmp/ctrl.in
          pip freeze | grep -Fif /tmp/ctrl.in > controller/requirements.txt

      - name: Upgrade webui dependencies
        run: |
          sed 's/==.*//' webui/requirements.txt | sort -u > /tmp/webui.in
          xargs pip install --quiet < /tmp/webui.in
          pip freeze | grep -Fif /tmp/webui.in > webui/requirements.txt

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: upgrade python dependencies"
          branch: deps/python-upgrade
          delete-branch: true
          title: "chore: weekly python dependency upgrade"
          body: |
            Automated weekly dependency upgrade.

            Packages updated in `controller/requirements.txt` and/or `webui/requirements.txt`.
            CI will run on this PR — merge once green.
          labels: dependencies
