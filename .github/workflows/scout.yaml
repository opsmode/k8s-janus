name: Docker Scout

# pull_request_target runs in the context of the base branch (main),
# so secrets are available even on Dependabot PRs.
on:
  pull_request_target:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'controller/**'
      - 'webui/**'

env:
  IMAGE: opsmode/k8s-janus

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Compare with latest
        uses: docker/scout-action@v1
        with:
          command: compare
          image: ${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}
          to: ${{ env.IMAGE }}:latest
          ignore-unchanged: true
          only-severities: critical,high
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
