name: Release

on:
  push:
    tags:
      - 'v*'

env:
  IMAGE: opsmode/k8s-janus

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64


  update-dockerhub:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update DockerHub description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: opsmode/k8s-janus
          readme-filepath: ./DOCKERHUB.md

  publish-helm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import GPG key
        run: |
          echo "${{ secrets.HELM_GPG_KEY }}" | gpg --batch --import
          gpg --export-secret-keys --output ~/.gnupg/secring.gpg

      - name: Set chart version and image tag from release tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: ${VERSION}/" helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" helm/Chart.yaml
          yq -i ".image.tag = \"${GITHUB_REF_NAME}\"" helm/values.yaml

      - name: Generate changelog for Artifact Hub
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          fi

          # Dump commits to a temp file — skip version-bump bot commits only
          git log "$RANGE" --pretty=format:"%s" | \
            grep -v "^ci: bump chart to" > /tmp/commits.txt

          python3 - /tmp/commits.txt helm/Chart.yaml "${GITHUB_REF_NAME}" <<'PYEOF'
          import re, sys

          commits_file, chart_file, tag = sys.argv[1], sys.argv[2], sys.argv[3]

          kind_map = [
              (r'^feat(\(.+\))?!?:', 'added'),
              (r'^fix(\(.+\))?!?:', 'fixed'),
              (r'^(refactor|perf)(\(.+\))?!?:', 'changed'),
              (r'^(security|sec)(\(.+\))?!?:', 'security'),
              (r'^(remove|deprecate)(\(.+\))?!?:', 'removed'),
          ]

          lines = open(commits_file).read().splitlines()
          entries = []
          for msg in lines:
              msg = msg.strip()
              if not msg:
                  continue
              kind = 'changed'
              for pattern, k in kind_map:
                  if re.match(pattern, msg):
                      kind = k
                      break
              desc = re.sub(r'^[a-z]+(\([^)]+\))?!?: ', '', msg)
              desc = desc.replace('"', '\\"')
              entries.append(f'    - kind: {kind}\n      description: "{desc}"')

          if not entries:
              entries = [f'    - kind: changed\n      description: "Release {tag}"']

          block = 'artifacthub.io/changes: |\n' + '\n'.join(entries) + '\n'

          content = open(chart_file).read()
          content = re.sub(
              r'artifacthub\.io/changes: \|.*?(?=\n\S|\Z)',
              block.rstrip(),
              content,
              flags=re.DOTALL
          )
          open(chart_file, 'w').write(content)
          print(f"Generated {len(entries)} changelog entries for {tag}")
          PYEOF

      - name: Package and sign Helm chart
        run: |
          helm package helm/ \
            --sign --key "OpsMode" --keyring ~/.gnupg/secring.gpg \
            --destination .deploy/

      - name: Checkout gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add gh-pages-dir gh-pages

      - name: Update Helm repo index
        run: |
          cp .deploy/*.tgz gh-pages-dir/
          cp .deploy/*.tgz.prov gh-pages-dir/
          helm repo index gh-pages-dir/ \
            --url https://opsmode.github.io/k8s-janus/ \
            --merge gh-pages-dir/index.yaml

      - name: Prune old Helm chart versions (keep 3)
        run: |
          cd gh-pages-dir
          # List versioned tarballs oldest-first, delete all but the 3 newest
          find . -maxdepth 1 -name 'k8s-janus-*.tgz' | sort -V | head -n -3 | while read -r f; do
            echo "Removing old chart: $f"
            rm -f "$f" "${f%.tgz}.tgz.prov"
          done
          # Rebuild index without deleted entries
          helm repo index . --url https://opsmode.github.io/k8s-janus/ --merge index.yaml

      - name: Push to gh-pages
        run: |
          cd gh-pages-dir
          git add .
          git diff --cached --quiet || git commit -m "helm: release ${{ github.ref_name }}"
          git push origin gh-pages

      - name: Commit chart version bump to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          VERSION=${{ github.ref_name }}
          VERSION_NUM=${VERSION#v}
          yq -i '.image.tag = "'$VERSION'"' helm/values.yaml
          sed -i "s/^version:.*/version: ${VERSION_NUM}/" helm/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION_NUM}\"/" helm/Chart.yaml
          git add helm/values.yaml helm/Chart.yaml
          git diff --cached --quiet || git commit -m "ci: bump chart to ${VERSION}"
          git push origin main

      - name: Update ArgoCD image tag to release version
        env:
          ARGOCD_DEPLOY_KEY: ${{ secrets.ARGOCD_DEPLOY_KEY }}
        run: |
          VERSION=${{ github.ref_name }}
          mkdir -p ~/.ssh
          printf '%s' "$ARGOCD_DEPLOY_KEY" > ~/.ssh/argocd_deploy
          chmod 600 ~/.ssh/argocd_deploy
          [ -f /root/.ssh/known_hosts ] || ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/argocd_deploy -o IdentitiesOnly=yes"

          rm -rf /tmp/argocd-release
          git clone git@github.com:opsmode/argocd.git /tmp/argocd-release
          cd /tmp/argocd-release

          python3 "${GITHUB_WORKSPACE}/.github/scripts/bump-argocd-tag.py" "${VERSION}"

          git config user.email "ci@opsmode.pro"
          git config user.name "opsmode-ci"
          git add applications/janus.applicationset.yaml
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "ci: bump k8s-janus image tag to ${VERSION}"
          git push

  prune-dockerhub:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Prune old DockerHub tags (keep 3 versioned + latest)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, urllib.request, urllib.error

          IMAGE = "opsmode/k8s-janus"
          user  = os.environ["DOCKERHUB_USERNAME"]
          token = os.environ["DOCKERHUB_TOKEN"]

          # Authenticate
          req = urllib.request.Request(
              "https://hub.docker.com/v2/users/login",
              data=json.dumps({"username": user, "password": token}).encode(),
              headers={"Content-Type": "application/json"},
          )
          jwt = json.loads(urllib.request.urlopen(req).read())["token"]
          headers = {"Authorization": f"Bearer {jwt}", "Content-Type": "application/json"}

          # Fetch all tags
          tags, url = [], f"https://hub.docker.com/v2/repositories/{IMAGE}/tags/?page_size=100"
          while url:
              r = urllib.request.Request(url, headers=headers)
              data = json.loads(urllib.request.urlopen(r).read())
              tags.extend(data["results"])
              url = data.get("next")

          # Categorise
          versioned = sorted(
              [t for t in tags if re.match(r'^v\d+\.\d+\.\d+$', t["name"])],
              key=lambda t: list(map(int, t["name"].lstrip("v").split("."))),
          )
          keep = {"latest"} | {t["name"] for t in versioned[-3:]}
          to_delete = [t["name"] for t in tags if t["name"] not in keep]

          print(f"Keeping: {sorted(keep)}")
          print(f"Deleting {len(to_delete)} tag(s): {sorted(to_delete)}")

          for name in to_delete:
              url = f"https://hub.docker.com/v2/repositories/{IMAGE}/tags/{name}/"
              req = urllib.request.Request(url, headers=headers, method="DELETE")
              try:
                  urllib.request.urlopen(req)
                  print(f"  deleted: {name}")
              except urllib.error.HTTPError as e:
                  print(f"  failed ({e.code}): {name}", file=sys.stderr)
          PYEOF

  release:
    needs: [build, publish-helm, update-dockerhub, prune-dockerhub]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Docker Image

            ```
            opsmode/k8s-janus:${{ github.ref_name }}
            ```

            ## Deploy via Helm

            ```bash
            helm repo add k8s-janus https://opsmode.github.io/k8s-janus
            helm repo update
            helm upgrade --install k8s-janus k8s-janus/k8s-janus \
              --namespace k8s-janus --create-namespace
            ```
