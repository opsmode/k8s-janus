name: CI - Build on Every Push

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'controller/**'
      - 'webui/**'
      - '.github/workflows/ci.yaml'

env:
  IMAGE: opsmode/k8s-janus

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install --quiet -r controller/requirements.txt -r webui/requirements.txt flake8

      - name: Lint controller
        working-directory: controller
        run: |
          python3 -c "import main" && echo "controller: import OK"
          flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402

      - name: Lint webui
        working-directory: webui
        run: |
          APP_DIR=$(pwd) python3 -c "import main" && echo "webui: import OK"
          flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402

  helm-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Lint Helm chart
        run: helm lint helm/ --strict

  build:
    needs: [lint, helm-lint]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to DockerHub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          mkdir -p $RUNNER_TEMP/.docker
          echo '{"auths":{}}' > $RUNNER_TEMP/.docker/config.json
          printf '%s' "$DOCKERHUB_TOKEN" | DOCKER_CONFIG=$RUNNER_TEMP/.docker docker login -u "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          DOCKER_CONFIG: ${{ runner.temp }}/.docker
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          platforms: linux/amd64

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Update ArgoCD image tag
        env:
          ARGOCD_DEPLOY_KEY: ${{ secrets.ARGOCD_DEPLOY_KEY }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$ARGOCD_DEPLOY_KEY" > ~/.ssh/argocd_deploy
          chmod 600 ~/.ssh/argocd_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/argocd_deploy -o IdentitiesOnly=yes"

          rm -rf /tmp/argocd
          git clone git@github.com:opsmode/argocd.git /tmp/argocd
          cd /tmp/argocd

          sed -i '' "s/tag: \"[^\"]*\"/tag: \"${SHA}\"/" applications/janus.applicationset.yaml

          git config user.email "ci@opsmode.pro"
          git config user.name "opsmode-ci"
          git add applications/janus.applicationset.yaml
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "ci: bump k8s-janus image tag to ${SHA}"
          git push
