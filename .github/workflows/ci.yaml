name: CI - Build on Every Push

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'controller/**'
      - 'webui/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

env:
  IMAGE: opsmode/k8s-janus

jobs:
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync deps (no-op if runner image is current)
        run: pip3 install --break-system-packages --quiet -r controller/requirements.txt -r webui/requirements.txt flake8

      - name: Lint controller
        working-directory: controller
        run: |
          python3 -c "import main" && echo "controller: import OK"
          flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402

      - name: Lint webui
        working-directory: webui
        run: |
          APP_DIR=$(pwd) python3 -c "import main" && echo "webui: import OK"
          flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402

  helm-lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Lint Helm chart
        run: helm lint helm/ --strict

  build:
    needs: [lint, helm-lint]
    runs-on: self-hosted
    env:
      DOCKER_CONFIG: /tmp/.docker-ci
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub (write auth directly, no keychain)
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          mkdir -p "$DOCKER_CONFIG"
          AUTH=$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64)
          printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}\n' "$AUTH" > "$DOCKER_CONFIG/config.json"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          platforms: linux/amd64

      - name: Rotate build cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Update ArgoCD image tag
        env:
          ARGOCD_DEPLOY_KEY: ${{ secrets.ARGOCD_DEPLOY_KEY }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$ARGOCD_DEPLOY_KEY" > ~/.ssh/argocd_deploy
          chmod 600 ~/.ssh/argocd_deploy
          [ -f /root/.ssh/known_hosts ] || ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/argocd_deploy -o IdentitiesOnly=yes"

          rm -rf /tmp/argocd
          git clone git@github.com:opsmode/argocd.git /tmp/argocd
          cd /tmp/argocd

          python3 -c "import re; f='applications/janus.applicationset.yaml'; open(f,'w').write(re.sub(r'tag: \"[^\"]*\"', 'tag: \"${SHA}\"', open(f).read()))"

          git config user.email "ci@opsmode.pro"
          git config user.name "opsmode-ci"
          git add applications/janus.applicationset.yaml
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "ci: bump k8s-janus image tag to ${SHA}"
          git push
