name: CI - Build on Every Push

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*'
    paths:
      - 'Dockerfile'
      - 'controller/**'
      - 'webui/**'
      - '.github/workflows/ci.yaml'
  workflow_dispatch:

env:
  IMAGE: infroware/k8s-janus

jobs:
  # Combine all linting into one job with parallel steps
  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      # Run all lint steps in parallel using background jobs
      - name: Lint all components
        run: |
          # Run linters in parallel
          cd controller && flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402 &
          CONTROLLER_PID=$!

          cd ../webui && flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402 &
          WEBUI_PID=$!

          cd ../helm && helm lint . --strict &
          HELM_PID=$!

          # Wait for all and check exit codes
          wait $CONTROLLER_PID
          CONTROLLER_EXIT=$?
          wait $WEBUI_PID
          WEBUI_EXIT=$?
          wait $HELM_PID
          HELM_EXIT=$?

          # Fail if any linter failed
          if [ $CONTROLLER_EXIT -ne 0 ] || [ $WEBUI_EXIT -ne 0 ] || [ $HELM_EXIT -ne 0 ]; then
            echo "Linting failed"
            exit 1
          fi

  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      # Cache pip packages to avoid reinstalling every time
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('webui/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Run webui tests
        working-directory: webui
        run: |
          # Install only if not cached
          pip3 install --break-system-packages --root-user-action=ignore --quiet pytest pytest-asyncio httpx
          pip3 install --break-system-packages --root-user-action=ignore --quiet -r requirements.txt
          python3 -m pytest tests/ -v --tb=short

  build:
    needs: [lint, test]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
          # Use GitHub Actions cache instead of local - more reliable
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Update ArgoCD image tag
        env:
          ARGOCD_DEPLOY_KEY: ${{ secrets.ARGOCD_DEPLOY_KEY }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$ARGOCD_DEPLOY_KEY" > ~/.ssh/argocd_deploy
          chmod 600 ~/.ssh/argocd_deploy
          [ -f /root/.ssh/known_hosts ] || ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/argocd_deploy -o IdentitiesOnly=yes"

          rm -rf /tmp/argocd
          git clone git@github.com:infroware/argocd.git /tmp/argocd
          cd /tmp/argocd

          python3 "${GITHUB_WORKSPACE}/.github/scripts/bump-argocd-tag.py" "${SHA}"

          git config user.email "ci@infroware.com"
          git config user.name "infroware-ci"
          git add applications/janus.applicationset.yaml
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "ci: bump k8s-janus image tag to ${SHA}"
          git push
