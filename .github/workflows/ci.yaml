name: CI - Build on Every Push

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'requirements.txt'
      - 'controller/**'
      - 'webui/**'
      - '.github/workflows/ci.yaml'

env:
  IMAGE: opsmode/k8s-janus

jobs:
  update-requirements:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade all dependencies
        run: |
          # Strip version pins, upgrade all packages, re-freeze
          sed 's/==.*//' requirements.txt > /tmp/deps.txt
          pip install --quiet $(cat /tmp/deps.txt | tr '\n' ' ')
          pip freeze --all | grep -Ff /tmp/deps.txt > requirements.txt
          git config user.email "ci@opsmode.io"
          git config user.name "opsmode-ci"
          git add requirements.txt
          git diff --cached --quiet && echo "requirements up to date" && exit 0
          git commit -m "chore: update requirements.txt"
          git push

  lint:
    needs: update-requirements
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt flake8

      - name: Lint controller
        working-directory: controller
        run: |
          python -c "import main" && echo "controller: import OK"
          flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402

      - name: Lint webui
        working-directory: webui
        run: |
          APP_DIR=$(pwd) python -c "import main" && echo "webui: import OK"
          flake8 . --max-line-length=120 --extend-ignore=E501,W503,E221,E225,E272,E302,E303,E305,E306,E402

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint helm/ --strict

  build:
    needs: [lint, helm-lint]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Update ArgoCD image tag
        env:
          ARGOCD_DEPLOY_KEY: ${{ secrets.ARGOCD_DEPLOY_KEY }}
          SHA: ${{ steps.tag.outputs.sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$ARGOCD_DEPLOY_KEY" > ~/.ssh/argocd_deploy
          chmod 600 ~/.ssh/argocd_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/argocd_deploy -o IdentitiesOnly=yes"

          git clone git@github.com:opsmode/argocd.git /tmp/argocd
          cd /tmp/argocd

          sed -i "s/tag: \"[a-f0-9]*\"/tag: \"${SHA}\"/" applications/janus.applicationset.yaml

          git config user.email "ci@opsmode.io"
          git config user.name "opsmode-ci"
          git add applications/janus.applicationset.yaml
          git diff --cached --quiet && echo "no change" && exit 0
          git commit -m "ci: bump k8s-janus image tag to ${SHA}"
          git push
