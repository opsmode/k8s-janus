version: 2
updates:
  # Docker base image
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
    groups:
      docker:
        patterns: ["*"]

  # GitHub Actions — all action bumps in one PR
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
    groups:
      github-actions:
        patterns: ["*"]

  # Python — controller and webui in one PR each, same day
  - package-ecosystem: pip
    directory: "/controller"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
    groups:
      python-controller:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/webui"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    labels:
      - dependencies
    groups:
      python-webui:
        patterns: ["*"]
