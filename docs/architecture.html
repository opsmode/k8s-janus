<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>K8s-Janus · Architecture</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #080d17;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }
  svg { display:block; }
</style>
</head>
<body>
<svg viewBox="0 0 960 620" width="960" height="620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%"   stop-color="#0f1929"/>
      <stop offset="100%" stop-color="#080d17"/>
    </radialGradient>

    <!-- Node gradients -->
    <linearGradient id="g-user"   x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e2d4a"/><stop offset="100%" stop-color="#131e35"/>
    </linearGradient>
    <linearGradient id="g-webui"  x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a52"/><stop offset="100%" stop-color="#0f1b3a"/>
    </linearGradient>
    <linearGradient id="g-db"     x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f40"/><stop offset="100%" stop-color="#10152e"/>
    </linearGradient>
    <linearGradient id="g-central" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2a1f"/><stop offset="100%" stop-color="#081a12"/>
    </linearGradient>
    <linearGradient id="g-remote" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a1a0a"/><stop offset="100%" stop-color="#1a100a"/>
    </linearGradient>
    <linearGradient id="g-ctrl"   x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2218"/><stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arr-blue"   markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green"  markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arr-dim"    markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4b6082"/>
    </marker>
    <marker id="arr-blue-r" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="620" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="200" cy="300" rx="180" ry="140" fill="#1a3a8f" opacity="0.06"/>
  <ellipse cx="700" cy="200" rx="200" ry="130" fill="#10b981" opacity="0.05"/>
  <ellipse cx="750" cy="480" rx="160" ry="100" fill="#f59e0b" opacity="0.05"/>

  <!-- ── TITLE ── -->
  <text x="480" y="38" text-anchor="middle" font-size="15" font-weight="700"
        fill="#e2e8f0" letter-spacing="3" font-family="'JetBrains Mono',monospace">K8S-JANUS  ARCHITECTURE</text>
  <text x="480" y="56" text-anchor="middle" font-size="11" fill="#4b6082" letter-spacing="1">kubectl exec · with approval</text>

  <!-- ══════════════════════════════════════════════════════
       NODE 1 — USERS  (top-left)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#glow-soft)">
    <rect x="60" y="80" width="160" height="90" rx="14" fill="url(#g-user)"
          stroke="#2a4a7f" stroke-width="1.2"/>
  </g>
  <!-- person icon -->
  <circle cx="105" cy="112" r="11" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <path d="M85 142 Q105 126 125 142" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round"/>
  <!-- admin badge -->
  <circle cx="133" cy="107" r="10" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="133" y="111" text-anchor="middle" font-size="8" font-weight="700" fill="#f59e0b">ADM</text>

  <text x="140" y="115" font-size="11.5" font-weight="600" fill="#93c5fd">Users</text>
  <text x="100" y="152" text-anchor="middle" font-size="9.5" fill="#64748b">Requester · Admin</text>
  <text x="100" y="165" text-anchor="middle" font-size="9.5" fill="#64748b">Browser (HTTPS)</text>

  <!-- ══════════════════════════════════════════════════════
       NODE 2 — WEB UI  (center, big)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#glow-soft)">
    <rect x="55" y="220" width="290" height="200" rx="16" fill="url(#g-webui)"
          stroke="#2d4fa3" stroke-width="1.5"/>
    <!-- top accent line -->
    <line x1="80" y1="220" x2="320" y2="220" stroke="url(#g-accent-blue)" stroke-width="1.5" opacity="0.6"/>
  </g>
  <defs>
    <linearGradient id="g-accent-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-accent-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <linearGradient id="g-accent-orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- WebUI label -->
  <text x="200" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#93c5fd" letter-spacing="1">WebUI</text>
  <text x="200" y="266" text-anchor="middle" font-size="9.5" fill="#4b6082">FastAPI · Python</text>

  <!-- Sub-chips inside WebUI -->
  <!-- Auth chip -->
  <rect x="75" y="278" width="74" height="30" rx="8" fill="#0f1e40" stroke="#2d4fa3" stroke-width="1"/>
  <text x="112" y="298" text-anchor="middle" font-size="10" fill="#60a5fa">Auth</text>

  <!-- REST API chip -->
  <rect x="163" y="278" width="74" height="30" rx="8" fill="#0f1e40" stroke="#2d4fa3" stroke-width="1"/>
  <text x="200" y="298" text-anchor="middle" font-size="10" fill="#60a5fa">REST API</text>

  <!-- Terminal WS chip -->
  <rect x="251" y="278" width="78" height="30" rx="8" fill="#0f1e40" stroke="#2d4fa3" stroke-width="1"/>
  <text x="290" y="298" text-anchor="middle" font-size="10" fill="#60a5fa">Terminal WS</text>

  <!-- Divider -->
  <line x1="80" y1="325" x2="320" y2="325" stroke="#1e2d50" stroke-width="1"/>

  <!-- Session DB / CSP / Middleware labels -->
  <text x="200" y="344" text-anchor="middle" font-size="9" fill="#334155">Session · Rate-limiting · CSP Nonces · OIDC / Local Auth</text>

  <!-- Alembic migrations note -->
  <rect x="75" y="355" width="250" height="28" rx="7" fill="#0c1528" stroke="#1a2d50" stroke-width="1"/>
  <text x="200" y="374" text-anchor="middle" font-size="9.5" fill="#4b6082">Alembic migrations · Async SQLAlchemy</text>

  <!-- Approval flow label -->
  <rect x="75" y="392" width="250" height="22" rx="6" fill="#091628" stroke="#1a2d50" stroke-width="1"/>
  <text x="200" y="407" text-anchor="middle" font-size="9" fill="#3b5a8a">Access Requests · Approval Workflow</text>

  <!-- ══════════════════════════════════════════════════════
       NODE 3 — POSTGRESQL  (left, bottom)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#glow-soft)">
    <rect x="60" y="466" width="158" height="86" rx="14" fill="url(#g-db)"
          stroke="#312e7a" stroke-width="1.2"/>
  </g>
  <!-- cylinder icon -->
  <ellipse cx="93" cy="500" rx="14" ry="5" fill="none" stroke="#7c3aed" stroke-width="1.3"/>
  <line x1="79" y1="500" x2="79" y2="516" stroke="#7c3aed" stroke-width="1.3"/>
  <line x1="107" y1="500" x2="107" y2="516" stroke="#7c3aed" stroke-width="1.3"/>
  <ellipse cx="93" cy="516" rx="14" ry="5" fill="none" stroke="#7c3aed" stroke-width="1.3"/>
  <text x="113" y="503" font-size="11.5" font-weight="600" fill="#a78bfa">PostgreSQL</text>
  <text x="139" y="517" text-anchor="middle" font-size="9" fill="#64748b">Users · Sessions</text>
  <text x="139" y="530" text-anchor="middle" font-size="9" fill="#64748b">Access Requests</text>
  <text x="139" y="543" text-anchor="middle" font-size="9" fill="#64748b">Audit Log</text>

  <!-- ══════════════════════════════════════════════════════
       NODE 4 — CENTRAL K8S CLUSTER  (center-right)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#glow-soft)">
    <rect x="400" y="80" width="270" height="280" rx="16" fill="url(#g-central)"
          stroke="#166534" stroke-width="1.5"/>
    <line x1="425" y1="80" x2="645" y2="80" stroke="url(#g-accent-green)" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="535" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#34d399" letter-spacing="1">Central Cluster</text>
  <text x="535" y="128" text-anchor="middle" font-size="9.5" fill="#4b6082">Management · Controller Host</text>

  <!-- K8s API Server chip -->
  <rect x="420" y="142" width="230" height="34" rx="9" fill="#061a0e" stroke="#166534" stroke-width="1"/>
  <!-- k8s wheel icon (simplified) -->
  <circle cx="442" cy="159" r="9" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <line x1="442" y1="151" x2="442" y2="167" stroke="#34d399" stroke-width="1.1"/>
  <line x1="434" y1="155" x2="450" y2="163" stroke="#34d399" stroke-width="1.1"/>
  <line x1="434" y1="163" x2="450" y2="155" stroke="#34d399" stroke-width="1.1"/>
  <text x="535" y="163" text-anchor="middle" font-size="10.5" fill="#6ee7b7">Kubernetes API Server</text>

  <!-- AccessRequest CRD chip -->
  <rect x="420" y="188" width="230" height="50" rx="9" fill="#061a0e" stroke="#166534" stroke-width="1"/>
  <text x="535" y="208" text-anchor="middle" font-size="10" font-weight="600" fill="#6ee7b7">AccessRequest CRD</text>
  <text x="535" y="224" text-anchor="middle" font-size="8.5" fill="#4b6082">cluster · namespace · pod · user</text>
  <text x="535" y="234" text-anchor="middle" font-size="8.5" fill="#4b6082">phase: Pending → Active → Done</text>

  <!-- Secrets chip -->
  <rect x="420" y="250" width="108" height="40" rx="9" fill="#061a0e" stroke="#166534" stroke-width="1"/>
  <text x="474" y="268" text-anchor="middle" font-size="10" fill="#6ee7b7">Kubeconfig</text>
  <text x="474" y="282" text-anchor="middle" font-size="8.5" fill="#4b6082">Secrets</text>

  <!-- RBAC chip -->
  <rect x="542" y="250" width="108" height="40" rx="9" fill="#061a0e" stroke="#166534" stroke-width="1"/>
  <text x="596" y="268" text-anchor="middle" font-size="10" fill="#6ee7b7">RBAC</text>
  <text x="596" y="282" text-anchor="middle" font-size="8.5" fill="#4b6082">Roles · Bindings</text>

  <!-- Janus Controller chip -->
  <rect x="420" y="302" width="230" height="42" rx="9" fill="#0a2218" stroke="#10b981" stroke-width="1.2"/>
  <text x="535" y="321" text-anchor="middle" font-size="10.5" font-weight="600" fill="#10b981">Janus Controller</text>
  <text x="535" y="336" text-anchor="middle" font-size="8.5" fill="#4b6082">Watches CRD · provisions tokens</text>

  <!-- ══════════════════════════════════════════════════════
       NODE 5 — REMOTE CLUSTERS  (right)
  ══════════════════════════════════════════════════════ -->
  <g filter="url(#glow-soft)">
    <rect x="730" y="140" width="190" height="290" rx="16" fill="url(#g-remote)"
          stroke="#7c3910" stroke-width="1.5"/>
    <line x1="755" y1="140" x2="895" y2="140" stroke="url(#g-accent-orange)" stroke-width="1.5" opacity="0.7"/>
  </g>
  <text x="825" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#fbbf24" letter-spacing="1">Remote Clusters</text>
  <text x="825" y="186" text-anchor="middle" font-size="9.5" fill="#4b6082">exec targets</text>

  <!-- Cluster cards -->
  <rect x="748" y="200" width="154" height="52" rx="9" fill="#1a0f06" stroke="#7c3910" stroke-width="1"/>
  <text x="825" y="221" text-anchor="middle" font-size="10" fill="#fbbf24">cluster-1</text>
  <text x="825" y="236" text-anchor="middle" font-size="8.5" fill="#4b6082">Pods · Namespaces</text>
  <text x="825" y="248" text-anchor="middle" font-size="8.5" fill="#4b6082">janus-remote SA</text>

  <rect x="748" y="264" width="154" height="52" rx="9" fill="#1a0f06" stroke="#7c3910" stroke-width="1"/>
  <text x="825" y="285" text-anchor="middle" font-size="10" fill="#fbbf24">cluster-2</text>
  <text x="825" y="300" text-anchor="middle" font-size="8.5" fill="#4b6082">Pods · Namespaces</text>
  <text x="825" y="312" text-anchor="middle" font-size="8.5" fill="#4b6082">janus-remote SA</text>

  <rect x="748" y="328" width="154" height="52" rx="9" fill="#1a0f06" stroke="#7c3910" stroke-width="1"/>
  <text x="825" y="349" text-anchor="middle" font-size="10" fill="#fbbf24">cluster-N</text>
  <text x="825" y="364" text-anchor="middle" font-size="8.5" fill="#4b6082">Pods · Namespaces</text>
  <text x="825" y="376" text-anchor="middle" font-size="8.5" fill="#4b6082">janus-remote SA</text>

  <!-- dots -->
  <circle cx="825" cy="407" r="3" fill="#7c3910"/>
  <circle cx="825" cy="418" r="3" fill="#7c3910" opacity="0.6"/>

  <!-- ══════════════════════════════════════════════════════
       ARROWS
  ══════════════════════════════════════════════════════ -->

  <!-- 1. User → WebUI -->
  <line x1="140" y1="170" x2="140" y2="218"
        stroke="#3b82f6" stroke-width="1.4" stroke-dasharray="4,3"
        marker-end="url(#arr-blue)"/>
  <text x="147" y="200" font-size="8.5" fill="#3b82f6">HTTPS</text>

  <!-- 2. WebUI ↔ PostgreSQL (bidirectional) -->
  <line x1="155" y1="420" x2="155" y2="464"
        stroke="#8b5cf6" stroke-width="1.4"
        marker-end="url(#arr-purple)"/>
  <line x1="175" y1="464" x2="175" y2="420"
        stroke="#8b5cf6" stroke-width="1.4"
        marker-end="url(#arr-purple)"/>
  <text x="186" y="447" font-size="8.5" fill="#8b5cf6">SQL</text>

  <!-- 3. WebUI → K8s API (create CRD) -->
  <path d="M345 300 C372 300 378 200 398 185"
        fill="none" stroke="#3b82f6" stroke-width="1.4" stroke-dasharray="5,3"
        marker-end="url(#arr-blue)"/>
  <text x="365" y="248" font-size="8.5" fill="#3b82f6" transform="rotate(-50,365,248)">Create CRD</text>

  <!-- 4. Controller → Remote Clusters (provision RBAC + secrets) -->
  <path d="M650 323 C690 323 705 290 728 265"
        fill="none" stroke="#10b981" stroke-width="1.4"
        marker-end="url(#arr-green)"/>
  <text x="680" y="295" font-size="8.5" fill="#10b981">RBAC + Token</text>

  <!-- 5. WebUI → Remote (kubectl exec WS) -->
  <path d="M345 350 C520 350 540 420 680 370 C710 360 720 310 728 285"
        fill="none" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5,3"
        marker-end="url(#arr-orange)"/>
  <text x="500" y="400" font-size="8.5" fill="#f59e0b">kubectl exec WebSocket</text>

  <!-- 6. Controller watches CRD (internal arrow) -->
  <path d="M535 302 L535 260"
        fill="none" stroke="#10b981" stroke-width="1" stroke-dasharray="3,2"
        marker-end="url(#arr-green)"/>
  <text x="540" y="285" font-size="7.5" fill="#4b8a6a">watches</text>

  <!-- ══════════════════════════════════════════════════════
       LEGEND  (bottom)
  ══════════════════════════════════════════════════════ -->
  <rect x="215" y="484" width="440" height="60" rx="12" fill="#0c1220" stroke="#1e2d4a" stroke-width="1"/>
  <text x="435" y="503" text-anchor="middle" font-size="9" font-weight="600" fill="#4b6082" letter-spacing="1.5">LEGEND</text>

  <!-- HTTPS -->
  <line x1="235" y1="518" x2="260" y2="518" stroke="#3b82f6" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arr-blue)"/>
  <text x="265" y="522" font-size="9" fill="#64748b">HTTPS / WS</text>

  <!-- SQL -->
  <line x1="325" y1="518" x2="350" y2="518" stroke="#8b5cf6" stroke-width="1.4" marker-end="url(#arr-purple)"/>
  <text x="355" y="522" font-size="9" fill="#64748b">Database</text>

  <!-- RBAC -->
  <line x1="410" y1="518" x2="435" y2="518" stroke="#10b981" stroke-width="1.4" marker-end="url(#arr-green)"/>
  <text x="440" y="522" font-size="9" fill="#64748b">K8s ops</text>

  <!-- Exec -->
  <line x1="495" y1="518" x2="520" y2="518" stroke="#f59e0b" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="525" y="522" font-size="9" fill="#64748b">exec tunnel</text>

  <!-- ══════════════════════════════════════════════════════
       FLOW BADGE  (bottom right)
  ══════════════════════════════════════════════════════ -->
  <rect x="690" y="474" width="228" height="108" rx="14" fill="#0a1020" stroke="#1e2d4a" stroke-width="1"/>
  <text x="804" y="494" text-anchor="middle" font-size="9" font-weight="600" fill="#4b6082" letter-spacing="1.5">APPROVAL FLOW</text>

  <circle cx="712" cy="516" r="9" fill="#1a2d52" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="712" y="520" text-anchor="middle" font-size="8" font-weight="700" fill="#60a5fa">1</text>
  <text x="727" y="520" font-size="8.5" fill="#64748b">User submits request</text>

  <circle cx="712" cy="540" r="9" fill="#1a2d52" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="712" y="544" text-anchor="middle" font-size="8" font-weight="700" fill="#fbbf24">2</text>
  <text x="727" y="544" font-size="8.5" fill="#64748b">Admin approves in UI</text>

  <circle cx="712" cy="564" r="9" fill="#1a2d52" stroke="#10b981" stroke-width="1.2"/>
  <text x="712" y="568" text-anchor="middle" font-size="8" font-weight="700" fill="#34d399">3</text>
  <text x="727" y="568" font-size="8.5" fill="#64748b">Controller provisions token</text>

  <circle cx="712" cy="588" r="9" fill="#1a2d52" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="712" y="592" text-anchor="middle" font-size="8" font-weight="700" fill="#c4b5fd">4</text>
  <text x="727" y="592" font-size="8.5" fill="#64748b">Exec tunnel opens</text>
</svg>
</body>
</html>
