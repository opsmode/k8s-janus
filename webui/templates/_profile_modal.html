{#
  Profile modal partial — included by every page that has a header with avatar.
  Required context vars: user_email, user_name
#}
<!-- Profile modal -->
<div class="modal-backdrop" id="profile-modal" style="display:none;">
  <div class="modal">
    <button class="modal-close" id="profile-close-btn"><i data-lucide="x" style="width:16px;height:16px;"></i></button>
    <h3>Your Profile</h3>
    <div class="avatar-upload-wrap">
      <div class="avatar-large" id="avatar-large">
        <div class="avatar-overlay"><i data-lucide="camera" style="width:20px;height:20px;color:#fff;"></i></div>
      </div>
      <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
      <span class="avatar-hint">Click to upload photo</span>
    </div>
    <label class="modal-label" for="profile-name-input">Display name</label>
    <input class="modal-input" id="profile-name-input" type="text" placeholder="Your name" maxlength="60">

    <!-- Change Password (local auth only) -->
    {% if local_auth_enabled %}
    <div style="margin-top:24px;padding-top:24px;border-top:1px solid var(--border,#2a3448);">
      <div style="font-size:0.72rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:var(--text-muted,#94a3b8);margin-bottom:12px;">Change Password</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <input class="modal-input" id="cp-current" type="password" placeholder="Current password">
        <input class="modal-input" id="cp-new" type="password" placeholder="New password (min 8 chars)">
        <input class="modal-input" id="cp-confirm" type="password" placeholder="Confirm new password">
        <div id="cp-error" style="display:none;font-size:0.78rem;color:var(--danger,#ef4444);"></div>
        <div id="cp-ok" style="display:none;font-size:0.78rem;color:var(--success,#10b981);">Password updated successfully.</div>
        <button class="modal-btn" id="cp-submit-btn" style="width:100%;">Update Password</button>
      </div>
    </div>
    {% endif %}

    <div class="modal-actions" style="margin-top:20px;">
      <button class="modal-btn" id="profile-cancel-btn">Cancel</button>
      <button class="modal-btn primary" id="profile-save-btn">Save</button>
    </div>
  </div>
</div>

<script nonce="{{ csp_nonce(request) }}">
  // ── Profile (localStorage + server sync) ──
  const _PROFILE_KEY = 'janus_profile_' + ({{ user_email | tojson }} || '').toLowerCase();
  const _USER_EMAIL  = ({{ user_email | tojson }} || '').toLowerCase();
  const _USER_NAME   = {{ user_name | tojson }};

  function _loadProfile() {
    try { return JSON.parse(localStorage.getItem(_PROFILE_KEY) || '{}'); } catch { return {}; }
  }
  function _saveProfileLocal(p) { localStorage.setItem(_PROFILE_KEY, JSON.stringify(p)); }

  function _applyProfile() {
    const p = _loadProfile();
    document.querySelectorAll('.avatar[data-email="' + _USER_EMAIL + '"], #avatar-large').forEach(el => {
      el.innerHTML = '';
      if (p.photo) {
        const img = document.createElement('img');
        img.src = p.photo;
        el.appendChild(img);
      } else {
        const rawName = p.name || _USER_NAME || '';
        const parts = rawName.split(/[\s@.]+/).filter(Boolean);
        el.textContent = parts.length >= 2
          ? (parts[0][0] + parts[1][0]).toUpperCase()
          : rawName.slice(0, 2).toUpperCase() || '?';
      }
    });
    const pillName = document.getElementById('profile-display-name');
    if (pillName) pillName.textContent = p.name || _USER_NAME || 'You';
  }

  async function _syncToServer(p) {
    try {
      await fetch('/api/profile', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: p.name || '', photo: p.photo || ''}),
      });
    } catch (_) { /* best-effort */ }
  }

  function openProfileModal() {
    const p = _loadProfile();
    document.getElementById('profile-name-input').value = p.name || _USER_NAME || '';
    document.getElementById('profile-modal').style.display = 'flex';
    lucide.createIcons({ nodes: [document.getElementById('profile-modal')] });
  }
  function closeProfileModal() { document.getElementById('profile-modal').style.display = 'none'; }

  function saveProfile() {
    const p = _loadProfile();
    p.name = document.getElementById('profile-name-input').value.trim() || (_USER_NAME || '');
    _saveProfileLocal(p);
    _syncToServer(p);
    _applyProfile();
    closeProfileModal();
    if (typeof showToast === 'function') showToast('Profile updated', 'success', 3000);
  }

  function resetProfile() {
    localStorage.removeItem(_PROFILE_KEY);
    _syncToServer({name: '', photo: ''});
    _applyProfile();
    document.getElementById('profile-name-input').value = _USER_NAME || '';
    const bigAvatar = document.getElementById('avatar-large');
    bigAvatar.innerHTML = '<div class="avatar-overlay"><i data-lucide="camera" style="width:20px;height:20px;color:#fff;"></i></div>';
    lucide.createIcons({ nodes: [bigAvatar] });
  }

  function onAvatarFileChange(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.size > 512 * 1024) {
      if (typeof showToast === 'function') showToast('Image too large (max 512 KB)', 'warning');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      const p = _loadProfile();
      p.photo = e.target.result;
      _saveProfileLocal(p);
      _syncToServer(p);
      _applyProfile();
      lucide.createIcons({ nodes: [document.getElementById('avatar-large')] });
    };
    reader.readAsDataURL(file);
  }

  function _fillAvatarInitials(el, nameOrEmail) {
    el.innerHTML = '';
    const parts = nameOrEmail.split(/[\s@.]+/).filter(Boolean);
    el.textContent = parts.length >= 2
      ? (parts[0][0] + parts[1][0]).toUpperCase()
      : nameOrEmail.slice(0, 2).toUpperCase() || '?';
  }

  async function _loadPeerAvatars() {
    const avatarEls = document.querySelectorAll('.avatar[data-email]');
    const emails = new Set();
    avatarEls.forEach(el => {
      const em = el.dataset.email;
      if (!em) return;
      if (!el.innerHTML.trim()) {
        if (em === _USER_EMAIL) {
          const p = _loadProfile();
          const rawName = p.name || _USER_NAME || em;
          if (p.photo) {
            const img = document.createElement('img');
            img.src = p.photo;
            el.innerHTML = '';
            el.appendChild(img);
          } else {
            _fillAvatarInitials(el, rawName);
          }
        } else {
          _fillAvatarInitials(el, em);
        }
      }
      if (em !== _USER_EMAIL) emails.add(em);
    });
    for (const email of emails) {
      try {
        const r = await fetch('/api/avatar/' + encodeURIComponent(email));
        if (!r.ok) continue;
        const d = await r.json();
        if (d.name) _peerNameCache[email.toLowerCase()] = d.name;
        document.querySelectorAll('.avatar[data-email="' + email + '"]').forEach(el => {
          el.innerHTML = '';
          if (d.photo) {
            const img = document.createElement('img');
            img.src = d.photo;
            el.appendChild(img);
          } else {
            _fillAvatarInitials(el, d.name || email);
          }
        });
        document.querySelectorAll('[data-approver-email="' + email + '"]').forEach(el => {
          if (d.name) { el.title = email; el.textContent = d.name + ' (' + email + ')'; }
        });
      } catch (_) { /* ignore */ }
    }
  }

  const _peerNameCache = {};
  function _getProfileName(email) {
    return _peerNameCache[email.toLowerCase()] || '';
  }

  async function submitChangePassword() {
    const current  = document.getElementById('cp-current').value;
    const newPw    = document.getElementById('cp-new').value;
    const confirm  = document.getElementById('cp-confirm').value;
    const errEl    = document.getElementById('cp-error');
    const okEl     = document.getElementById('cp-ok');
    errEl.style.display = 'none';
    okEl.style.display  = 'none';
    if (!current || !newPw || !confirm) { errEl.textContent = 'All fields required.'; errEl.style.display = 'block'; return; }
    if (newPw !== confirm) { errEl.textContent = 'New passwords do not match.'; errEl.style.display = 'block'; return; }
    if (newPw.length < 8) { errEl.textContent = 'New password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
    try {
      const r = await fetch('/api/me/password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({current_password: current, new_password: newPw}),
      });
      const d = await r.json();
      if (r.ok) {
        document.getElementById('cp-current').value = '';
        document.getElementById('cp-new').value = '';
        document.getElementById('cp-confirm').value = '';
        okEl.style.display = 'block';
      } else {
        errEl.textContent = d.error || 'Failed to update password.';
        errEl.style.display = 'block';
      }
    } catch (_) {
      errEl.textContent = 'Request failed.';
      errEl.style.display = 'block';
    }
  }

  // ── Event listeners (replaces inline onclick/onchange for CSP compliance) ──
  document.addEventListener('DOMContentLoaded', function() {
    _applyProfile();
    _loadPeerAvatars();

    document.querySelectorAll('.avatar[data-email="' + _USER_EMAIL + '"]').forEach(el => {
      el.addEventListener('click', openProfileModal);
    });

    document.getElementById('profile-modal').addEventListener('click', function(e) {
      if (e.target === this) closeProfileModal();
    });
    document.getElementById('profile-close-btn').addEventListener('click', closeProfileModal);
    document.getElementById('profile-cancel-btn').addEventListener('click', closeProfileModal);
    document.getElementById('profile-save-btn').addEventListener('click', saveProfile);

    document.getElementById('avatar-large').addEventListener('click', function() {
      document.getElementById('avatar-file-input').click();
    });
    document.getElementById('avatar-file-input').addEventListener('change', onAvatarFileChange);

    var cpBtn = document.getElementById('cp-submit-btn');
    if (cpBtn) cpBtn.addEventListener('click', submitChangePassword);
  });
</script>
