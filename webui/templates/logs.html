<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K8S-Janus | Logs</title>
  <link rel="icon" type="image/png" href="/static/k8s-janus-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
  {% include '_base_styles.html' %}
  <style>
    /* ── MAIN LAYOUT ── */
    .log-layout {
      flex: 1;
      display: flex;
      gap: 0;
      overflow: hidden;
      padding: 20px 24px 20px;
    }

    /* ── RESIZE HANDLE ── */
    .resize-handle {
      width: 6px;
      flex-shrink: 0;
      cursor: col-resize;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .resize-handle::after {
      content: '';
      width: 2px;
      height: 40px;
      background: var(--border);
      border-radius: 2px;
      transition: background 0.15s, height 0.15s;
    }
    .resize-handle:hover::after,
    .resize-handle.dragging::after {
      background: var(--accent);
      height: 60px;
    }

    /* ── LOG PANE ── */
    .log-pane {
      flex: 1;
      min-width: 100px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }
    .log-pane::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    }

    .pane-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .pane-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.live { background: var(--success); box-shadow: 0 0 5px rgba(16,185,129,0.6); }
    .status-dot.reconnecting { background: #f59e0b; }
    .status-dot.error { background: var(--danger); }

    .pane-actions {
      display: flex;
      gap: 6px;
      margin-left: auto;
    }
    .pane-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-dim); font-size: 0.73rem; font-weight: 500;
      padding: 3px 9px; border-radius: 5px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .pane-btn:hover { color: var(--text); border-color: var(--border-light); background: var(--surface-3); }
    .pane-btn.paused { color: var(--warning); border-color: rgba(245,158,11,0.4); }

    .log-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.55;
      color: var(--text-muted);
    }
    .log-body::-webkit-scrollbar { width: 5px; height: 5px; }
    .log-body::-webkit-scrollbar-track { background: transparent; }
    .log-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

    .log-line { white-space: pre-wrap; word-break: break-all; display: block; padding: 1px 0; }

    /* token-level colours */
    .lt  { color: #64748b; }                         /* timestamp */
    .ll  { font-weight: 600; }
    .ll.lerror    { color: #f87171; }
    .ll.lcritical { color: #fb923c; }
    .ll.lwarning  { color: #fbbf24; }
    .ll.linfo     { color: #38bdf8; }
    .ll.ldebug    { color: #94a3b8; }
    .lk  { color: #a78bfa; }                         /* logger/source */
    .lm  { }                                         /* message — inherits line colour */
    .lip { color: #64748b; }                         /* remote ip */

    /* HTTP method badges */
    .hm       { font-weight: 700; padding: 0 3px; border-radius: 3px; }
    .hm-GET   { color: #34d399; }
    .hm-POST  { color: #60a5fa; }
    .hm-PUT   { color: #fbbf24; }
    .hm-PATCH { color: #c084fc; }
    .hm-DEL   { color: #f87171; }
    .hm-HEAD  { color: #94a3b8; }

    /* HTTP status code */
    .hs-2 { color: #34d399; font-weight: 600; }
    .hs-3 { color: #67e8f9; font-weight: 600; }
    .hs-4 { color: #fbbf24; font-weight: 600; }
    .hs-5 { color: #f87171; font-weight: 600; }

    /* traceback / indent lines */
    .tb-hdr  { color: #fb923c; font-weight: 600; }
    .tb-file { color: #a78bfa; }
    .tb-code { color: #fde68a; padding-left: 8px; }
    .tb-exc  { color: #f87171; font-weight: 600; }

    /* line-level background tint */
    .log-line.error    { color: #fca5a5; background: rgba(248,113,113,0.04); }
    .log-line.critical { color: #fdba74; background: rgba(251,146,60,0.06); font-weight: 600; }
    .log-line.warning  { color: #fde68a; background: rgba(251,191,36,0.04); }
    .log-line.info     { color: var(--text-muted); }
    .log-line.debug    { color: var(--text-dim); }
    .log-line.access   { color: #94a3b8; }

    .log-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  {% set page_subtitle = "System Logs" %}
  {% set brand_href = "/admin" %}
  {% set nav_items = [{"href": "/admin", "icon": "arrow-left", "label": "Back to Admin"}] %}
  {% include '_header.html' %}

  <div class="log-layout">
    <!-- Controller pane -->
    <div class="log-pane">
      <div class="pane-header">
        <span class="status-dot" id="dot-controller"></span>
        <span class="pane-title">
          <i data-lucide="cpu" style="width:14px;height:14px;color:var(--accent);"></i>
          Controller
        </span>
        <span class="log-count" id="count-controller">0 lines</span>
        <div class="pane-actions">
          <button class="pane-btn" onclick="clearPane('controller')">
            <i data-lucide="eraser" style="width:11px;height:11px;"></i>
            Clear
          </button>
          <button class="pane-btn" id="pause-controller" onclick="togglePause('controller')">
            <i data-lucide="pause" style="width:11px;height:11px;" id="pause-icon-controller"></i>
            Pause
          </button>
        </div>
      </div>
      <div class="log-body" id="log-controller"></div>
    </div>

    <div class="resize-handle" id="log-resize-handle"></div>

    <!-- WebUI pane -->
    <div class="log-pane">
      <div class="pane-header">
        <span class="status-dot" id="dot-webui"></span>
        <span class="pane-title">
          <i data-lucide="globe" style="width:14px;height:14px;color:var(--accent-2);"></i>
          WebUI
        </span>
        <span class="log-count" id="count-webui">0 lines</span>
        <div class="pane-actions">
          <button class="pane-btn" onclick="clearPane('webui')">
            <i data-lucide="eraser" style="width:11px;height:11px;"></i>
            Clear
          </button>
          <button class="pane-btn" id="pause-webui" onclick="togglePause('webui')">
            <i data-lucide="pause" style="width:11px;height:11px;" id="pause-icon-webui"></i>
            Pause
          </button>
        </div>
      </div>
      <div class="log-body" id="log-webui"></div>
    </div>
  </div>

  <script nonce="{{ csp_nonce(request) }}">
    lucide.createIcons();

    var _state = {
      controller: { es: null, paused: false, count: 0 },
      webui:      { es: null, paused: false, count: 0 },
    };

    // ── Log format regexes ─────────────────────────────────────────────────────
    // 1. Structured Python logger:  [2026-03-05 14:12:20] k8s-janus [INFO    ] msg
    var _RE_STRUCT = /^(\[[^\]]+\])\s+(\S+)\s+(\[[\w\s]+\])\s+([\s\S]*)$/;
    // 2. Uvicorn access:  INFO:     1.2.3.4:56789 - "GET /path HTTP/1.1" 200 OK
    var _RE_ACCESS = /^(INFO|DEBUG|WARNING|ERROR|CRITICAL):\s{1,6}(\S+)\s+-\s+"(GET|POST|PUT|PATCH|DELETE|HEAD|OPTIONS)\s+(\S+)\s+HTTP\/[\d.]+"\s+(\d{3})\s+(.*)$/;
    // 3. Plain stdlib:  LEVEL:logger:message  or  LEVEL:message
    var _RE_STDLIB = /^(DEBUG|INFO|WARNING|ERROR|CRITICAL):([^:]+?):(.+)$/;
    // 4. Traceback header
    var _RE_TB_HDR  = /^(Traceback \(most recent call last\):)$/;
    // 5. Traceback file line:   File "...", line N, in func
    var _RE_TB_FILE = /^(\s+)(File ".*?", line \d+.*?)$/;
    // 6. Exception line: ExceptionName: message  (not starting with spaces)
    var _RE_TB_EXC  = /^([A-Za-z][\w.]*(?:Error|Exception|Warning|Fault|Interrupt|Exit|Killed)):\s(.*)$/;

    function _levelClass(lv) {
      var u = lv.toUpperCase();
      if (u.includes('CRITICAL') || u.includes('EXCEPTION')) return 'lcritical';
      if (u.includes('ERROR'))   return 'lerror';
      if (u.includes('WARN'))    return 'lwarning';
      if (u.includes('DEBUG'))   return 'ldebug';
      return 'linfo';
    }

    function _lineLevel(text) {
      var u = text.toUpperCase();
      if (u.includes('CRITICAL') || u.includes('TRACEBACK') || u.includes('EXCEPTION')) return 'critical';
      if (u.includes('ERROR'))   return 'error';
      if (u.includes('WARNING') || u.includes('[WARN')) return 'warning';
      if (u.includes('DEBUG'))   return 'debug';
      if (_RE_ACCESS.test(text)) return 'access';
      return 'info';
    }

    function _esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function _methodSpan(method) {
      var cls = method === 'GET' ? 'hm-GET' : method === 'POST' ? 'hm-POST'
              : method === 'PUT' ? 'hm-PUT' : method === 'PATCH' ? 'hm-PATCH'
              : method === 'DELETE' ? 'hm-DEL' : 'hm-HEAD';
      return '<span class="hm ' + cls + '">' + method + '</span>';
    }

    function _statusSpan(code) {
      var n = parseInt(code, 10);
      var cls = n < 300 ? 'hs-2' : n < 400 ? 'hs-3' : n < 500 ? 'hs-4' : 'hs-5';
      return '<span class="' + cls + '">' + code + '</span>';
    }

    function _renderLine(text) {
      var level = _lineLevel(text);
      var span  = document.createElement('span');
      span.className = 'log-line ' + level;
      var m;

      // ── Format 1: structured Python logger ──────────────────────────────────
      m = _RE_STRUCT.exec(text);
      if (m) {
        var lc = _levelClass(m[3]);
        span.innerHTML =
          '<span class="lt">'        + _esc(m[1]) + '</span> ' +
          '<span class="lk">'        + _esc(m[2]) + '</span> ' +
          '<span class="ll ' + lc + '">' + _esc(m[3]) + '</span> ' +
          '<span class="lm">'        + _esc(m[4]) + '</span>';
        return span;
      }

      // ── Format 2: uvicorn access log ─────────────────────────────────────────
      m = _RE_ACCESS.exec(text);
      if (m) {
        span.innerHTML =
          '<span class="lt">' + _esc(m[1]) + ':</span> ' +
          '<span class="lip">' + _esc(m[2]) + '</span> - ' +
          '"' + _methodSpan(m[3]) + ' <span class="lm">' + _esc(m[4]) + '</span>"' +
          ' ' + _statusSpan(m[5]) +
          (m[6] ? ' <span class="lt">' + _esc(m[6]) + '</span>' : '');
        return span;
      }

      // ── Format 3: stdlib  LEVEL:logger:msg ──────────────────────────────────
      m = _RE_STDLIB.exec(text);
      if (m) {
        var lc2 = _levelClass(m[1]);
        span.innerHTML =
          '<span class="ll ' + lc2 + '">' + _esc(m[1]) + '</span>' +
          '<span class="lt">:</span><span class="lk">' + _esc(m[2]) + '</span>' +
          '<span class="lt">:</span><span class="lm">' + _esc(m[3]) + '</span>';
        return span;
      }

      // ── Format 4: Traceback header ──────────────────────────────────────────
      m = _RE_TB_HDR.exec(text);
      if (m) {
        span.className = 'log-line critical';
        span.innerHTML = '<span class="tb-hdr">' + _esc(m[1]) + '</span>';
        return span;
      }

      // ── Format 5: Traceback file line ───────────────────────────────────────
      m = _RE_TB_FILE.exec(text);
      if (m) {
        span.className = 'log-line debug';
        span.innerHTML = '<span class="tb-file">' + _esc(m[2]) + '</span>';
        return span;
      }

      // ── Format 6: Exception type ────────────────────────────────────────────
      m = _RE_TB_EXC.exec(text);
      if (m) {
        span.className = 'log-line error';
        span.innerHTML =
          '<span class="tb-exc">' + _esc(m[1]) + '</span>' +
          '<span class="lt">: </span><span class="lm">' + _esc(m[2]) + '</span>';
        return span;
      }

      // ── Fallback: plain text ─────────────────────────────────────────────────
      span.textContent = text;
      return span;
    }

    function _appendLine(component, text) {
      var s = _state[component];
      if (s.paused) return;
      var body = document.getElementById('log-' + component);
      var span = _renderLine(text);
      body.appendChild(span);
      s.count++;
      document.getElementById('count-' + component).textContent = s.count + ' lines';
      // Auto-scroll if already near bottom
      if (body.scrollHeight - body.scrollTop - body.clientHeight < 120) {
        body.scrollTop = body.scrollHeight;
      }
    }

    function clearPane(component) {
      document.getElementById('log-' + component).innerHTML = '';
      _state[component].count = 0;
      document.getElementById('count-' + component).textContent = '0 lines';
    }

    function togglePause(component) {
      var s = _state[component];
      s.paused = !s.paused;
      var btn  = document.getElementById('pause-' + component);
      var icon = document.getElementById('pause-icon-' + component);
      if (s.paused) {
        btn.classList.add('paused');
        btn.innerHTML = '<i data-lucide="play" style="width:11px;height:11px;"></i> Resume';
      } else {
        btn.classList.remove('paused');
        btn.innerHTML = '<i data-lucide="pause" style="width:11px;height:11px;" id="pause-icon-' + component + '"></i> Pause';
      }
      lucide.createIcons();
    }

    function _setDot(component, state) {
      var dot = document.getElementById('dot-' + component);
      dot.className = 'status-dot' + (state === 'live' ? ' live' : state === 'error' ? ' error' : '');
    }

    function startStream(component) {
      var s = _state[component];
      if (s.es) { s.es.close(); }

      var es = new EventSource('/api/system-logs/' + component + '?tail=200');
      s.es = es;

      es.onopen = function() { _setDot(component, 'live'); };

      es.onmessage = function(e) {
        if (e.data) _appendLine(component, e.data);
      };

      es.onerror = function() {
        _setDot(component, 'reconnecting');
        es.close();
        setTimeout(function() { startStream(component); }, 5000);
      };
    }

    startStream('controller');
    startStream('webui');

    // ── Pane resize ──
    (function() {
      var handle  = document.getElementById('log-resize-handle');
      var layout  = handle.parentElement;
      var panes   = layout.querySelectorAll('.log-pane');
      var paneA   = panes[0];
      var paneB   = panes[1];
      var dragging = false, startX = 0, startW = 0;

      handle.addEventListener('mousedown', function(e) {
        dragging = true;
        startX   = e.clientX;
        startW   = paneA.getBoundingClientRect().width;
        handle.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var total = layout.getBoundingClientRect().width;
        var handleW = handle.offsetWidth;
        var available = total - handleW;
        var delta = e.clientX - startX;
        var newA  = Math.max(100, Math.min(startW + delta, available - 100));
        paneA.style.flex = 'none';
        paneA.style.width = newA + 'px';
        paneB.style.flex = '1';
        paneB.style.width = '';
      });

      document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        handle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      });
    })();
  </script>
  {% include '_profile_modal.html' %}
</body>
</html>
