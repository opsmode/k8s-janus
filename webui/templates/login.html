<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>K8S-Janus | Sign In</title>
  <link rel="icon" type="image/png" href="/static/k8s-janus-logo-white.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:          #080c14;
      --surface:     #0d1117;
      --surface-2:   #161b27;
      --surface-3:   #1e2535;
      --border:      #2a3448;
      --border-light:#334155;
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --text-dim:    #64748b;
      --accent:      #6366f1;
      --accent-glow: rgba(99,102,241,0.35);
      --accent-2:    #8b5cf6;
      --radius:      12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px 36px;
      width: 360px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.08), 0 24px 48px rgba(0,0,0,0.5);
    }

    .logo-wrap {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .logo-icon svg { width: 22px; height: 22px; color: #fff; }
    .brand h1 {
      font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e2e8f0, #94a3b8);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .brand span {
      font-size: 0.7rem; color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
    }

    h2 {
      font-size: 0.95rem; font-weight: 600; color: var(--text-muted);
      margin-bottom: 28px;
    }

    .sign-in-btn {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-size: 0.92rem; font-weight: 600;
      border: none; border-radius: 8px; cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 18px var(--accent-glow);
    }
    .sign-in-btn:hover { opacity: 0.9; box-shadow: 0 0 28px var(--accent-glow); }
    .sign-in-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      margin: 20px 0 16px;
      border: none; border-top: 1px solid var(--border);
    }

    .footer-note {
      font-size: 0.72rem; color: var(--text-dim); line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="brand">
        <h1>K8s-Janus</h1>
        <span>just-in-time access</span>
      </div>
    </div>

    <h2>Sign in to continue</h2>

    <a href="/login/redirect?next={{ next | urlencode }}" class="sign-in-btn">
      <i data-lucide="log-in"></i>
      Sign in with {{ provider_name }}
    </a>

    <hr class="divider">
    <p class="footer-note">
      Access is restricted to authorised users.<br>
      Your session will expire after 24 hours.
    </p>
  </div>

  <script>lucide.createIcons();</script>
</body>
</html>
