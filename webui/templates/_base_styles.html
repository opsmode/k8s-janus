{# Shared CSS for all full-page templates. Include inside <head> after fonts/scripts. #}
<style>
  :root {
    --bg:          #080c14;
    --surface:     #0d1117;
    --surface-2:   #161b27;
    --surface-3:   #1e2535;
    --border:      #2a3448;
    --border-light:#334155;
    --text:        #e2e8f0;
    --text-muted:  #94a3b8;
    --text-dim:    #64748b;
    --accent:      #326CE5;
    --accent-glow: rgba(50,108,229,0.35);
    --accent-2:    #4A90D9;
    --success:     #10b981;
    --warning:     #f59e0b;
    --danger:      #ef4444;
    --info:        #3b82f6;
    --radius:      12px;
    --radius-sm:   8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(50,108,229,0.12) 0%, transparent 70%);
  }

  /* ── HEADER ── */
  header {
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(20px) saturate(1.4);
    border-bottom: none;
    box-shadow: 0 1px 0 rgba(50,108,229,0.2), 0 4px 24px rgba(0,0,0,0.4);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 100;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(50,108,229,0.5) 50%, transparent 100%);
  }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-text h1 {
    font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em;
    background: linear-gradient(135deg, #f1f5f9, #94a3b8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .brand-text span { font-size: 0.68rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.01em; }
  .hdr-icon-btn { color:var(--text-dim);display:flex;align-items:center;padding:5px;border-radius:6px;transition:color 0.15s,background 0.15s; text-decoration:none; }
  .hdr-icon-btn:hover { color:var(--text); background: rgba(255,255,255,0.05); }
  .nav-link {
    font-size: 0.75rem; color: var(--text-dim); text-decoration: none;
    display: flex; align-items: center; gap: 5px;
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }
  .nav-link:hover { color: var(--text); border-color: var(--border-light); background: rgba(255,255,255,0.03); }
  .nav-admin { color: rgba(50,108,229,0.7); border-color: rgba(50,108,229,0.2); }
  .nav-admin:hover { color: var(--accent); border-color: rgba(50,108,229,0.5); background: rgba(50,108,229,0.06); }
  .nav-signout:hover { color: var(--danger); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.04); }
  .hdr-user-dropdown { position:relative; }
  .hdr-dropdown-menu { display:none;position:absolute;top:calc(100% + 6px);right:0;min-width:160px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:200;overflow:hidden; }
  .hdr-dropdown-menu.open { display:block; }
  .hdr-dropdown-item { display:flex;align-items:center;gap:8px;width:100%;padding:9px 14px;font-size:0.8rem;color:var(--text-muted);background:transparent;border:none;cursor:pointer;text-decoration:none;transition:background 0.12s,color 0.12s;font-family:'Inter',sans-serif; }
  .hdr-dropdown-item:hover { background:rgba(255,255,255,0.05);color:var(--text); }
  .hdr-dropdown-divider { height:1px;background:var(--border);margin:2px 0; }
  .hdr-dropdown-signout:hover { color:var(--danger);background:rgba(239,68,68,0.06); }
  .header-pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px 4px 6px;
    font-size: 0.75rem; color: var(--text-muted);
    cursor: pointer; transition: border-color 0.15s;
  }
  .header-pill:hover { border-color: var(--border-light); }
  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; font-weight: 700; color: #fff; flex-shrink: 0;
    cursor: pointer; overflow: hidden; transition: box-shadow 0.15s;
  }
  .avatar:hover { box-shadow: 0 0 0 2px var(--accent); }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  /* ── Profile Modal ── */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 28px 24px;
    width: 320px; position: relative;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .modal::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .modal h3 { font-size: 0.92rem; font-weight: 600; margin-bottom: 20px; color: var(--text); }
  .modal-close {
    position: absolute; top: 14px; right: 14px;
    background: transparent; border: none; color: var(--text-dim); cursor: pointer;
    display: flex; padding: 4px; border-radius: 4px; transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }
  .avatar-upload-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 20px; }
  .avatar-large {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 700; color: #fff;
    cursor: pointer; overflow: hidden; position: relative; transition: box-shadow 0.15s;
  }
  .avatar-large:hover { box-shadow: 0 0 0 3px var(--accent); }
  .avatar-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .avatar-large .avatar-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.15s; border-radius: 50%;
  }
  .avatar-large:hover .avatar-overlay { opacity: 1; }
  #avatar-file-input { display: none; }
  .avatar-hint { font-size: 0.72rem; color: var(--text-dim); }
  .modal-label { font-size: 0.72rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; display: block; }
  .modal-input {
    width: 100%; padding: 9px 12px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 0.875rem;
    font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s;
    margin-bottom: 16px;
  }
  .modal-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn {
    padding: 8px 16px; border-radius: 6px; font-size: 0.82rem; font-weight: 600;
    cursor: pointer; border: 1px solid var(--border); background: var(--surface-2);
    color: var(--text-muted); transition: background 0.15s, color 0.15s;
  }
  .modal-btn:hover { color: var(--text); background: var(--surface-3); }
  .modal-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    border-color: transparent; color: #fff; box-shadow: 0 2px 12px var(--accent-glow);
  }
  .modal-btn.primary:hover { opacity: 0.9; }

  /* ── Toast ── */
  #toast-container {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    display: flex; flex-direction: column; gap: 8px;
  }
  .toast {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    font-size: 0.82rem; color: var(--text);
    animation: toast-in 0.2s ease; max-width: 340px;
  }
  .toast.warning { border-color: rgba(245,158,11,0.4); }
  .toast svg { flex-shrink: 0; }
  @keyframes toast-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ── Layout ── */
  .page-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
  .page-scroll::-webkit-scrollbar { width: 6px; }
  .page-scroll::-webkit-scrollbar-track { background: transparent; }
  .page-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  /* ── Card ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 28px; margin-bottom: 20px;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
  }
  .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .card-icon {
    width: 32px; height: 32px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    color: var(--accent); flex-shrink: 0;
  }
  .card-header h2 { font-size: 0.95rem; font-weight: 600; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  thead tr { border-bottom: 1px solid var(--border); }
  th {
    text-align: left; padding: 8px 12px;
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; color: var(--text-dim); white-space: nowrap;
  }
  td {
    padding: 10px 12px; color: var(--text-muted);
    border-bottom: 1px solid rgba(42,52,72,0.5); vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── Buttons ── */
  .btn-sm {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text-muted); font-size: 0.78rem; padding: 5px 10px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s; display: inline-flex; align-items: center; gap: 5px;
    text-decoration: none;
  }
  .btn-sm:hover { color: var(--text); border-color: var(--border-light); }
  .btn-sm.btn-primary { background: var(--accent); border-color: transparent; color: #fff; }
  .btn-sm.btn-primary:hover { opacity: 0.85; }

  /* ── Session banner ── */
  #session-banner {
    display: none;
    background: rgba(245,158,11,0.1); border-bottom: 1px solid rgba(245,158,11,0.3);
    padding: 8px 32px; font-size: 0.8rem; color: var(--warning);
    align-items: center; gap: 8px; flex-shrink: 0;
  }
</style>
