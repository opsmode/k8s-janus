<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MFA Verification | K8S-Janus</title>
  <link rel="icon" type="image/png" href="/static/k8s-janus-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@0.474.0/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:          #080c14;
      --surface:     #0d1117;
      --surface-2:   #161b27;
      --surface-3:   #1e2535;
      --border:      #2a3448;
      --text:        #e2e8f0;
      --text-muted:  #94a3b8;
      --text-dim:    #64748b;
      --accent:      #326CE5;
      --accent-glow: rgba(50,108,229,0.35);
      --accent-2:    #4A90D9;
      --success:     #10b981;
      --warning:     #f59e0b;
      --danger:      #ef4444;
      --radius:      12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% -10%, rgba(50,108,229,0.12) 0%, transparent 70%);
    }

    .mfa-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      width: 420px;
      max-width: 94vw;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      position: relative;
    }

    .mfa-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .mfa-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f1f5f9, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.875rem;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.125rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.2em;
      text-align: center;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 12px;
      color: var(--danger);
      font-size: 0.875rem;
      margin-bottom: 20px;
      display: none;
    }

    .hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 16px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--text-dim);
      text-decoration: none;
      margin-top: 24px;
      transition: color 0.15s;
      justify-content: center;
      width: 100%;
    }

    .back-link:hover {
      color: var(--text);
    }
  </style>
</head>
<body>
  <div class="mfa-card">
    <div class="mfa-icon">
      <i data-lucide="shield-check" style="width:32px;height:32px;color:#fff;"></i>
    </div>

    <h1>MFA Verification</h1>
    <p class="subtitle">Enter your 6-digit authentication code</p>

    <div id="error-msg" class="error"></div>

    <form id="mfa-form" onsubmit="verifyCode(event)">
      <div class="form-group">
        <label for="code">Authentication Code</label>
        <input
          type="text"
          id="code"
          name="code"
          pattern="[0-9]{6}"
          maxlength="6"
          placeholder="000000"
          autocomplete="off"
          autofocus
          required
        />
      </div>

      <button type="submit" class="btn" id="submit-btn">
        Verify & Continue
      </button>
    </form>

    <p class="hint">
      Open your authenticator app and enter the 6-digit code.<br>
      Lost your device? Use a backup code instead.
    </p>

    <a href="/" class="back-link">
      <i data-lucide="arrow-left" style="width:14px;height:14px;"></i>
      Back to dashboard
    </a>
  </div>

  <script>
    lucide.createIcons();

    async function verifyCode(event) {
      event.preventDefault();

      const code = document.getElementById('code').value.trim();
      const errorEl = document.getElementById('error-msg');
      const submitBtn = document.getElementById('submit-btn');

      if (!code || code.length !== 6) {
        errorEl.textContent = 'Please enter a valid 6-digit code';
        errorEl.style.display = 'block';
        return;
      }

      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';

      try {
        const response = await fetch('/api/mfa/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });

        const data = await response.json();

        if (response.ok) {
          // Redirect to original destination
          const params = new URLSearchParams(window.location.search);
          const next = params.get('next') || '/';
          window.location.href = next;
        } else {
          errorEl.textContent = data.error || 'Invalid code. Please try again.';
          errorEl.style.display = 'block';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Verify & Continue';
          document.getElementById('code').value = '';
          document.getElementById('code').focus();
        }
      } catch (error) {
        errorEl.textContent = 'Verification failed. Please try again.';
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Verify & Continue';
      }
    }
  </script>
</body>
</html>
