---
# Number of replicas for both controller and webui deployments.
# High Availability: Set to 2+ for zero-downtime deployments.
# - Webui uses sticky sessions (sessionAffinity: ClientIP) for multi-replica support
# - Controller uses leader election (one active, others standby)
# - PostgreSQL recommended (not required) for multi-replica to share profiles/audit data
# replicaCount > 1 also enables PodDisruptionBudget (pdb.yaml)
replicaCount: 1
# Extra labels added to all k8s resources (merged with the standard
# app.kubernetes.io/* labels that are always applied automatically).
# Example:
#   labels:
#     environment: production
#     team: platform
labels: {}
# Container image used by both controller and webui deployments.
# Tag is updated automatically by CI on every release.
# → templates: controller-deployment.yaml, webui-deployment.yaml
image:
  repository: infroware/k8s-janus
  tag: "v1.0.6"
  pullPolicy: IfNotPresent
# Web UI service. LoadBalancer exposes the UI externally.
# The callback URL for approvals is auto-derived from the LoadBalancer IP.
# → templates: webui-service.yaml
service:
  type: ClusterIP
  port: 80
# Ingress for the web UI. Disabled by default — LoadBalancer is used instead.
# Enable and configure if you prefer an ingress controller + TLS termination.
# → templates: webui-ingress.yaml (only rendered when enabled: true)
ingress:
  enabled: false
  ingressClass: nginx
  clusterIssuer: letsencrypt-prod
  host: ""
  # oAuth2ProxyAuthUrl: https://oauth2-proxy.example.com/oauth2/auth
  # oAuth2ProxyAuthSignInUrl: https://oauth2-proxy.example.com/oauth2/start
  proxyReadTimeout: "3600" # nginx proxy-read-timeout in seconds
# Gateway API HTTPRoute for Envoy Gateway / any Gateway API-compatible proxy.
# Alternative to ingress — use this instead of ingress when running on a cluster
# with a Gateway API controller (e.g. Envoy Gateway, Istio, Cilium).
# TLS is terminated at the Gateway level; no cert config needed here.
# → templates: webui-httproute.yaml (only rendered when enabled: true)
httproute:
  enabled: false
  hostname: "" # e.g. janus.infroware.com
  gatewayName: main
  gatewayNamespace: gateway
# Core Janus configuration — passed to both deployments via ConfigMap.
# → templates: configmap.yaml, namespace.yaml
janus:
  # Kubernetes namespace where Janus is deployed and stores token Secrets
  namespace: "k8s-janus"
  # Name and display name for this (central) cluster shown in the UI.
  # Can be updated at any time — just re-deploy; no data migration needed.
  # Remote clusters are auto-discovered from kubeconfig Secrets — no list needed.
  clusterName: "central"
  clusterDisplayName: "Central Cluster"
  defaultTtlSeconds: 3600 # Default access duration in the request form (1h)
  maxTtlSeconds: 28800 # Hard cap engineers cannot exceed (8h)
  # TTL options shown in the admin approval dropdown (in seconds).
  # Each entry becomes a selectable override. Values exceeding maxTtlSeconds are ignored.
  approvalTtlOptions:
    - 3600 # 1h
    - 7200 # 2h
    - 14400 # 4h
    - 28800 # 8h
  crdRetentionSeconds: 86400 # Delete expired/denied/revoked CRDs after (24h)
  pendingExpirySeconds: 0 # Auto-deny Pending requests after this many seconds (0 = disabled)
  idleTimeoutSeconds: 0 # Terminate idle web terminal sessions (0 = disabled)
  # IANA timezone for timestamps in the web UI (e.g. "Europe/Berlin",
  # "America/New_York"). Affects all displayed request times. Default: UTC.
  displayTimezone: "UTC"
  # Emails with admin access: can approve/deny/revoke all requests.
  # Must be set before deploying — leave empty to disable admin access.
  adminEmails: []
  #  - admin@your-org.com
  # Namespaces hidden from the request form and blocked from access requests.
  # System and infrastructure namespaces should always be listed here.
  excludedNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease
    - kube-flannel
    - default
    # GKE system namespaces
    - gke-managed-cim
    - gke-managed-networking-dra-driver
    - gke-managed-system
    - gke-managed-volumepopulator
    - gmp-public
    - gmp-system
# → templates: controller-deployment.yaml
controller:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
# Web UI deployment settings.
# baseUrl: public URL of this instance — used for approval callback links.
#          Leave empty to auto-derive from the LoadBalancer IP.
# authEnabled: set to true when an oauth2-proxy/SSO ingress sets X-Forwarded-Email.
#              When false (default) and oidc.enabled is also false, Janus uses built-in
#              local auth: an admin@local account is created on first startup and the
#              password is printed to the application log.
# containerPort: internal port the webui process listens on (do not change
#                unless you build a custom image that uses a different port).
# mfa.encryptionKey:   Fernet key for encrypting TOTP secrets at rest.
#                      Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
#                      Set this in ArgoCD via helm.valuesObject or a dedicated Secret.
#                      IMPORTANT: losing this key invalidates all enrolled MFA tokens.
#                      Leave unset to use an ephemeral key (secrets lost on pod restart).
# mfa.existingSecret:  Name of an existing Secret with key 'encryptionKey' — use this
#                      instead of mfa.encryptionKey when the key is managed externally
#                      (e.g. Sealed Secrets, External Secrets Operator).
# → templates: webui-deployment.yaml, mfa-secret.yaml
webui:
  baseUrl: ""
  authEnabled: false
  containerPort: 8000
  mfa:
    encryptionKey: ""
    existingSecret: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
# External Secrets Operator integration. When enabled, kubeconfig Secrets and
# the PostgreSQL password Secret are synced from an external secret store
# (e.g. AWS Secrets Manager, GCP Secret Manager, Vault) instead of being
# created manually.
# → templates: cluster-secrets.yaml, postgresql-externalsecret.yaml
# (postgresql-externalsecret only rendered when both flags are true)
externalSecrets:
  enabled: false
  # secretStore: "my-secret-store"  # ClusterSecretStore name (required when enabled)
  # refreshInterval: "1h"
# PostgreSQL backend for persistent request history.
# When disabled, Janus uses SQLite — data is lost on pod restart (single-replica only).
#
# Two modes:
#   bundled  — deploy a PostgreSQL StatefulSet inside the cluster (recommended default).
#              Password is auto-generated and stored in a Secret; stable across upgrades.
#   external — connect to an existing PostgreSQL instance you manage.
#              Set host/port/database/username and create the password Secret manually
#              (or use externalSecrets to sync it from a secret store).
#
# → templates: postgresql-bundled.yaml, init-db-job.yaml,
#              controller-deployment.yaml, webui-deployment.yaml,
#              postgresql-externalsecret.yaml (when externalSecrets also true)
postgresql:
  enabled: false      # set true to use external PostgreSQL
  bundled:
    enabled: false    # set true to deploy in-cluster PostgreSQL (overrides enabled above)
    image: postgres:16-alpine
    storageSize: 2Gi
    storageClass: ""  # leave empty for cluster default StorageClass
  # External PostgreSQL settings (used when bundled.enabled=false)
  host: ""
  port: 5432
  database: "k8s-janus"
  username: "k8s-janus"
  # secretKey: "K8S-JANUS-DB-PASSWORD"  # key in external secret store (externalSecrets)
# PodDisruptionBudget — only rendered when replicaCount > 1.
# minAvailable: minimum number of pods that must remain available during
# voluntary disruptions (node drains, rolling updates).
# → templates: pdb.yaml
pdb:
  minAvailable: 1
# NetworkPolicy — restricts ingress/egress for controller and webui pods.
# Egress is limited to Kubernetes API (443/6443) and DNS (53).
# → templates: networkpolicy.yaml
networkPolicy:
  enabled: true
# Remote agent mode — deploy this chart on a target cluster to grant the
# central Janus controller access. When enabled, only the ServiceAccount,
# ClusterRole, and ClusterRoleBinding are created (no controller/webui).
# Run scripts/setup.sh afterwards to extract the token and register the cluster.
# → templates: remote-rbac.yaml (only rendered when remote.enabled: true)
remote:
  enabled: false
  # Name of the ServiceAccount the central controller uses to authenticate.
  serviceAccountName: janus-remote
  # Token lifetime for the static kubeconfig Secret (re-run setup.sh to refresh).
  tokenDuration: "8760h"
# Automated token refresh for remote clusters (central cluster only).
# CronJob checks remote cluster tokens and alerts when they need manual refresh.
# → templates: token-refresh-cronjob.yaml
tokenRefresh:
  enabled: false
  # Cron schedule for token validation (default: weekly on Sunday at 2 AM UTC)
  schedule: "0 2 * * 0"
  # kubectl image version for token refresh job
  kubectlVersion: "1.31"
# Native OIDC/OAuth2 authentication. When enabled, Janus handles the OAuth
# flow directly — no oauth2-proxy or ingress annotation required.
# Supports any OIDC-compliant provider plus GitHub (OAuth2).
#
# Secret handling (clientSecret + sessionSecret), in priority order:
#   1. existingSecret  — point to a pre-existing Secret you manage externally
#   2. externalSecrets.enabled=true — ExternalSecret syncs from your secret store
#   3. plain Secret    — values taken from clientSecret/sessionSecret below
#      (sessionSecret is auto-generated if left blank)
#
# → templates: oidc-secret.yaml (plain), oidc-externalsecret.yaml (ESO),
#              configmap.yaml, webui-deployment.yaml
oidc:
  enabled: false
  # Provider preset: google | github | entra | okta | gitlab | custom
  # Known providers auto-configure issuerUrl; custom requires issuerUrl below.
  provider: ""
  clientId: ""
  # Plain secret values — only used when externalSecrets.enabled=false and
  # existingSecret is empty. clientSecret is required; sessionSecret is
  # auto-generated if blank.
  clientSecret: ""
  sessionSecret: ""
  # ExternalSecret remote key names — only used when externalSecrets.enabled=true.
  # These are the keys/paths in your secret store (e.g. GCP Secret Manager names,
  # AWS Secrets Manager ARNs, Vault paths).
  secretKeys:
    clientSecret: "janus-oidc-client-secret"
    sessionSecret: "janus-oidc-session-secret"
  issuerUrl: "" # required for okta/custom; auto-set for google/entra/gitlab
  tenantId: "" # Entra ID (Azure AD) only: your-tenant-id or "common"
  allowedDomains: [] # restrict login to these email domains, e.g. ["your-org.com"]
  scopes: "openid email profile"
  existingSecret: "" # name of a pre-existing Secret with clientSecret+sessionSecret keys
