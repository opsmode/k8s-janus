{{- if not .Values.remote.enabled }}
{{- if .Values.httproute.enabled -}}
{{- if not .Values.httproute.hostname -}}
  {{- fail "httproute.hostname must be set when httproute.enabled is true" -}}
{{- end -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "janus.fullname" . }}
  namespace: {{ .Values.janus.namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httproute.gatewayName }}
      namespace: {{ .Values.httproute.gatewayNamespace }}
  hostnames:
    - {{ .Values.httproute.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "janus.webui.name" . }}
          namespace: {{ .Values.janus.namespace }}
          port: {{ .Values.service.port }}
{{- end }}
{{- end }}
