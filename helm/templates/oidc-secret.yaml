{{- if and .Values.oidc .Values.oidc.enabled (not .Values.oidc.existingSecret) (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "janus.oidc.secretName" . }}
  namespace: {{ .Values.janus.namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
type: Opaque
stringData:
  clientSecret: {{ required "oidc.clientSecret is required when oidc.enabled=true" .Values.oidc.clientSecret | quote }}
  sessionSecret: {{ .Values.oidc.sessionSecret | default (randAlphaNum 32) | quote }}
{{- end }}
