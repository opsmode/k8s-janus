{{- if not .Values.remote.enabled }}
{{- if and .Values.oidc.enabled .Values.externalSecrets.enabled (not .Values.oidc.existingSecret) }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "janus.oidc.secretName" . }}
  namespace: {{ .Values.janus.namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    app.kubernetes.io/component: oidc
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ required "externalSecrets.secretStore is required when externalSecrets.enabled=true" .Values.externalSecrets.secretStore }}
  target:
    name: {{ include "janus.oidc.secretName" . }}
    creationPolicy: Owner
  data:
  - secretKey: clientSecret
    remoteRef:
      key: {{ .Values.oidc.secretKeys.clientSecret | default "janus-oidc-client-secret" }}
  - secretKey: sessionSecret
    remoteRef:
      key: {{ .Values.oidc.secretKeys.sessionSecret | default "janus-oidc-session-secret" }}
{{- end }}
{{- end }}
