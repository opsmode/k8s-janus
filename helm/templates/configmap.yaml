{{- if not .Values.remote.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "janus.configmap.name" . }}
  namespace: {{ .Values.janus.namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
data:
  DEFAULT_TTL_SECONDS: {{ .Values.janus.defaultTtlSeconds | quote }}
  MAX_TTL_SECONDS: {{ .Values.janus.maxTtlSeconds | quote }}
  JANUS_NAMESPACE: {{ .Values.janus.namespace | quote }}
  EXCLUDED_NAMESPACES: {{ .Values.janus.excludedNamespaces | join "," | quote }}
  ADMIN_EMAILS: {{ .Values.janus.adminEmails | join "," | quote }}
  WEBUI_BASE_URL: {{ .Values.webui.baseUrl | default "" | quote }}
  CRD_RETENTION_SECONDS: {{ .Values.janus.crdRetentionSeconds | quote }}
  PENDING_EXPIRY_SECONDS: {{ .Values.janus.pendingExpirySeconds | default 0 | quote }}
  JANUS_CLUSTER_NAME: {{ .Values.janus.clusterName | default "local" | quote }}
  JANUS_CLUSTER_DISPLAY_NAME: {{ .Values.janus.clusterDisplayName | default (.Values.janus.clusterName | default "local") | quote }}
  IDLE_TIMEOUT_SECONDS: {{ .Values.janus.idleTimeoutSeconds | default 900 | quote }}
  AUTH_ENABLED: {{ ternary "true" "false" (ne .Values.webui.authEnabled false) | quote }}
  DISPLAY_TIMEZONE: {{ .Values.janus.displayTimezone | default "UTC" | quote }}
  OIDC_ENABLED:         {{ ternary "true" "false" (and .Values.oidc .Values.oidc.enabled) | quote }}
  OIDC_PROVIDER:        {{ ((.Values.oidc).provider) | default "" | quote }}
  OIDC_CLIENT_ID:       {{ ((.Values.oidc).clientId) | default "" | quote }}
  OIDC_ISSUER_URL:      {{ ((.Values.oidc).issuerUrl) | default "" | quote }}
  OIDC_TENANT_ID:       {{ ((.Values.oidc).tenantId) | default "" | quote }}
  OIDC_ALLOWED_DOMAINS: {{ ((.Values.oidc).allowedDomains) | default list | join "," | quote }}
  OIDC_SCOPES:          {{ ((.Values.oidc).scopes) | default "openid email profile" | quote }}
{{- end }}
