{{- if ((.Values.postgresql.bundled).enabled) }}
{{- $fullname   := include "janus.fullname" . }}
{{- $secretName := printf "%s-postgresql" $fullname }}
{{- $namespace  := .Values.janus.namespace }}
{{- $dbName     := .Values.postgresql.database | default "k8s-janus" }}
{{- $dbUser     := .Values.postgresql.username | default "k8s-janus" }}
---
# ServiceAccount for the secret-init Job (minimal permissions)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullname }}-postgresql-init
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullname }}-postgresql-init
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullname }}-postgresql-init
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullname }}-postgresql-init
subjects:
  - kind: ServiceAccount
    name: {{ $fullname }}-postgresql-init
    namespace: {{ $namespace }}
---
# Job: create the PostgreSQL password Secret only if it does not already exist.
# Running as a pre-install/pre-upgrade hook means it completes before the
# StatefulSet starts, so PostgreSQL always initialises with the correct password.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ $fullname }}-postgresql-secret-init
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 2
  template:
    metadata:
      labels:
        {{- include "janus.labels" . | nindent 8 }}
        app.kubernetes.io/component: postgresql-secret-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ $fullname }}-postgresql-init
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: secret-init
          image: bitnami/kubectl:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              if kubectl get secret {{ $secretName }} -n {{ $namespace }} >/dev/null 2>&1; then
                echo "Secret {{ $secretName }} already exists — skipping."
              else
                PASSWORD=$(cat /dev/urandom | tr -dc 'A-Za-z0-9' | head -c 24)
                kubectl create secret generic {{ $secretName }} \
                  --from-literal=password="${PASSWORD}" \
                  -n {{ $namespace }}
                echo "Secret {{ $secretName }} created."
              fi
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-postgresql
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: {{ $fullname }}-postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-postgresql
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ $fullname }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $fullname }}-postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $fullname }}-postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgresql
          image: {{ (.Values.postgresql.bundled).image | default "postgres:16-alpine" | quote }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ $dbName | quote }}
            - name: POSTGRES_USER
              value: {{ $dbUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $dbUser | quote }}, "-d", {{ $dbName | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $dbUser | quote }}, "-d", {{ $dbName | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "janus.labels" . | nindent 10 }}
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with (.Values.postgresql.bundled).storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ (.Values.postgresql.bundled).storageSize | default "2Gi" | quote }}
{{- end }}
