{{- if ((.Values.postgresql.bundled).enabled) }}
{{- $fullname   := include "janus.fullname" . }}
{{- $secretName := printf "%s-postgresql" $fullname }}
{{- $namespace  := .Values.janus.namespace }}
{{- $dbName     := .Values.postgresql.database | default "k8s-janus" }}
{{- $dbUser     := .Values.postgresql.username | default "k8s-janus" }}

{{/*
  Lookup existing Secret to keep the password stable across upgrades.
  On first install the Secret doesn't exist yet — generate a random password.
*/}}
{{- $existingSecret := lookup "v1" "Secret" $namespace $secretName }}
{{- $password := "" }}
{{- if $existingSecret }}
{{- $password = index $existingSecret.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 24 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
stringData:
  password: {{ $password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-postgresql
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app.kubernetes.io/name: {{ $fullname }}-postgresql
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullname }}-postgresql
  namespace: {{ $namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ $fullname }}-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $fullname }}-postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $fullname }}-postgresql
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: database
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgresql
          image: {{ (.Values.postgresql.bundled).image | default "postgres:16-alpine" | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ $dbName | quote }}
            - name: POSTGRES_USER
              value: {{ $dbUser | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $dbUser | quote }}, "-d", {{ $dbName | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $dbUser | quote }}, "-d", {{ $dbName | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "janus.labels" . | nindent 10 }}
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with (.Values.postgresql.bundled).storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ (.Values.postgresql.bundled).storageSize | default "2Gi" | quote }}
{{- end }}
