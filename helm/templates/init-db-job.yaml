{{- if and (not .Values.remote.enabled) (include "janus.postgresql.enabled" .) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "janus.fullname" . }}-init-db
  namespace: {{ .Values.janus.namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "janus.labels" . | nindent 8 }}
        app.kubernetes.io/component: init-db
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- if (.Values.postgresql.bundled).enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "janus.postgresql.host" . }} -p 5432 -U {{ .Values.postgresql.username | default "k8s-janus" | quote }}; do
                echo "Waiting for PostgreSQL..."; sleep 2
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      {{- end }}
      containers:
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/app/webui/db_migrate.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_HOST
              value: {{ include "janus.postgresql.host" . | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | default 5432 | quote }}
            - name: DB_NAME
              value: {{ .Values.postgresql.database | default "k8s-janus" | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.username | default "k8s-janus" | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "janus.fullname" . }}-postgresql
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
