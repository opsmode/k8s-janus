{{- if not .Values.remote.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "janus.webui.name" . }}
  namespace: {{ .Values.janus.namespace }}
  labels:
    {{- include "janus.labels" . | nindent 4 }}
spec:
  revisionHistoryLimit: 1
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "janus.webui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "janus.labels" . | nindent 8 }}
        {{- include "janus.webui.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "janus.webui.name" . }}
      {{- if gt (int .Values.replicaCount) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "janus.webui.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- if include "janus.postgresql.enabled" . }}
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER"; do
                echo "Waiting for PostgreSQL..."; sleep 3
              done
              echo "PostgreSQL ready."
          env:
            - name: DB_HOST
              value: {{ include "janus.postgresql.host" . | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | default 5432 | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.username | default "k8s-janus" | quote }}
      {{- end }}
      containers:
        - name: webui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "main:app", "--app-dir", "/app/webui", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips=*", "--access-log"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: {{ .Values.webui.containerPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "janus.configmap.name" . }}
          env:
            - name: APP_DIR
              value: /app/webui
            {{- if or (.Values.webui.mfa).encryptionKey (.Values.webui.mfa).existingSecret }}
            - name: MFA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "janus.mfa.secretName" . }}
                  key: encryptionKey
            {{- end }}
            {{- if include "janus.postgresql.enabled" . }}
            - name: DB_HOST
              value: {{ include "janus.postgresql.host" . | quote }}
            - name: DB_PORT
              value: {{ .Values.postgresql.port | default 5432 | quote }}
            - name: DB_NAME
              value: {{ .Values.postgresql.database | default "k8s-janus" | quote }}
            - name: DB_USER
              value: {{ .Values.postgresql.username | default "k8s-janus" | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "janus.fullname" . }}-postgresql
                  key: password
            {{- end }}
            {{- if and .Values.oidc .Values.oidc.enabled }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "janus.oidc.secretName" . }}
                  key: clientSecret
            - name: OIDC_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "janus.oidc.secretName" . }}
                  key: sessionSecret
            {{- end }}
          resources:
            {{- toYaml .Values.webui.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30  # up to 150s for startup
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
