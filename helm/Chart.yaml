apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 0.1.35
appVersion: "0.1.35"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: Pending request auto-expiry — PENDING_EXPIRY_SECONDS auto-denies stale requests
    - kind: added
      description: Per-pane disconnect button — disconnect from a pod shell without closing the terminal tab
    - kind: fixed
      description: Expired access now sends structured JSON to stop browser WS reconnect loops
    - kind: fixed
      description: Controller on_phase_change no longer fires spuriously on non-actionable transitions
    - kind: changed
      description: License switched from AGPL v3 to Apache 2.0
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/opsmode/k8s-janus
    - name: Helm Repository
      url: https://opsmode.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/opsmode/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://opsmode.github.io/k8s-janus
sources:
  - https://github.com/opsmode/k8s-janus
maintainers:
