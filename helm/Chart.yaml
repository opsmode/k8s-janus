apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 1.0.6
appVersion: "1.0.6"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "MFA/TOTP support — optional 2FA before terminal access with QR code setup, backup codes, and encrypted storage"
    - kind: added
      description: "Native HA support — multi-replica deployments with sticky sessions, leader election, and DB-backed profiles (no Redis required)"
    - kind: changed
      description: "User profiles now stored in PostgreSQL when enabled (fallback to memory) for HA compatibility"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/infroware/k8s-janus
    - name: Helm Repository
      url: https://infroware.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/infroware/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://infroware.github.io/k8s-janus
sources:
  - https://github.com/infroware/k8s-janus
maintainers:
  - name: infroware
    email: devops@infroware.com
