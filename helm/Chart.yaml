apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 1.0.0
appVersion: "1.0.0"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "v1.0.0 — first stable release"
    - kind: added
      description: "Browser-based kubectl exec terminal with split-pane, logs, events, and quick commands"
    - kind: added
      description: "Multi-cluster and multi-namespace support — one approval spans multiple namespaces"
    - kind: added
      description: "Native OIDC/SSO — Google, GitHub, Entra ID, Okta, GitLab, custom provider"
    - kind: added
      description: "Self-service withdraw — engineers cancel Pending or Active requests from dashboard or status page"
    - kind: added
      description: "Full audit trail — every session, command, idle timeout, and revocation logged"
    - kind: added
      description: "PostgreSQL backend — optional persistent history across pod restarts"
    - kind: added
      description: "Remote cluster registration via setup wizard (CLI or browser) or GitOps Helm remote mode"
    - kind: added
      description: "Test suite — 73 automated tests covering routes, auth middleware, DB layer, and validation"
    - kind: security
      description: "Terminal session isolation — users can only exec into their own approved sessions"
    - kind: security
      description: "Alpine base images patched for CVE-2025-60876, CVE-2026-22184, CVE-2026-27171"
    - kind: fixed
      description: "Terminal reconnect stability — pod re-attaches automatically after WebSocket disconnect"
    - kind: fixed
      description: "TTL countdown gated on Active phase only — no longer shown for Revoked/Expired"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/infroware/k8s-janus
    - name: Helm Repository
      url: https://infroware.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/infroware/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://infroware.github.io/k8s-janus
sources:
  - https://github.com/infroware/k8s-janus
maintainers:
  - name: infroware
    email: devops@infroware.com
