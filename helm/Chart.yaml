apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 0.4.0
appVersion: "0.4.0"
annotations:
  artifacthub.io/changes: |
    - kind: fixed
      description: "Terminal: pod re-selection on WS reconnect — previouslyselected pod now automatically re-attaches after disconnect"
    - kind: fixed
      description: "Terminal: noShellPods cache cleared on reconnect so transient exec failures don't permanently lock pod to logs-only view"
    - kind: fixed
      description: "terminal_ws: _open_shell retries up to 3x with backoff — tolerates transient API server 500s during node recycling"
    - kind: fixed
      description: "Terminal: Loading pods... placeholder never removed after first successful pod load"
    - kind: fixed
      description: "Admin/index: TTL countdown shown for Revoked/Expired phases — now gated on Active phase only"
    - kind: fixed
      description: "Admin: TTL override value not reflected until page refresh — approve response now returns ttlSeconds + expiresAt"
    - kind: fixed
      description: "Index: terminal link/button stays after cancel — removed for non-Active phases"
    - kind: fixed
      description: "Terminal route: admin could open another user's exec session — now 403 if caller != requester"
    - kind: fixed
      description: "Status page: added Withdraw button for Pending and Active requests"
    - kind: fixed
      description: "Header: version display changed from v0.4.0 to version 0.4.0"
    - kind: security
      description: "CVE fixes: apk upgrade in Alpine images (CVE-2025-60876, CVE-2026-22184, CVE-2026-27171)"
    - kind: added
      description: "Test suite: 73 tests covering routes, auth, DB layer, and input validation"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/infroware/k8s-janus
    - name: Helm Repository
      url: https://infroware.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/infroware/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://infroware.github.io/k8s-janus
sources:
  - https://github.com/infroware/k8s-janus
maintainers:
  - name: infroware
    email: devops@infroware.com
