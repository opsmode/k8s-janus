apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 0.1.34
appVersion: "0.1.34"
license: Apache-2.0
annotations:
  artifacthub.io/changes: |
    - kind: changed
      description: Remote clusters no longer need a Helm agent — setup-upload.sh handles RBAC and token issuance directly
    - kind: changed
      description: clusters[] removed from values — cluster discovery is automatic from kubeconfig Secrets
    - kind: fixed
      description: Browser mode POSTs setup/run immediately after upload to avoid exec-auth token expiry
    - kind: changed
      description: helm/README.md overhauled — accurate setup flow, screenshots, updated config reference
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/opsmode/k8s-janus
    - name: Helm Repository
      url: https://opsmode.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/opsmode/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://opsmode.github.io/k8s-janus
sources:
  - https://github.com/opsmode/k8s-janus
