apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 1.0.2
appVersion: "1.0.2"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "Namespace filter input on request form — instant client-side search, shown when cluster has >6 namespaces"
    - kind: added
      description: "GET /version endpoint — returns {version, build_date} for health checks and tooling"
    - kind: added
      description: "Rate limiting on request creation — 10 req/hr per user by default (MAX_REQUESTS_PER_WINDOW env)"
    - kind: added
      description: "Max concurrent live requests per user — 5 by default (MAX_ACTIVE_REQUESTS env)"
    - kind: added
      description: "BUILD_DATE baked into Docker images at release time — shown in startup log"
    - kind: fixed
      description: "APP_VERSION now sourced from Chart.appVersion instead of image.tag — no longer shows commit SHA"
    - kind: fixed
      description: "Pod health badge backgrounds now render correctly (--warning-rgb/--danger-rgb CSS vars added)"
    - kind: fixed
      description: "Controller logs cluster registration count on startup"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/infroware/k8s-janus
    - name: Helm Repository
      url: https://infroware.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/infroware/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://infroware.github.io/k8s-janus
sources:
  - https://github.com/infroware/k8s-janus
maintainers:
  - name: infroware
    email: devops@infroware.com
