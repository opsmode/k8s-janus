apiVersion: v2
name: k8s-janus
description: "K8s-Janus — God of Gateways. Just-in-Time Kubernetes pod access with approval workflow."
type: application
version: 1.0.1
appVersion: "1.0.1"
annotations:
  artifacthub.io/changes: |
    - kind: added
      description: "Pod health signals in terminal sidebar — TERM/OOM/CRASH badges, restart counter, danger icon"
    - kind: fixed
      description: "Terminal no longer hangs on deleted pods — 404/401 API errors shown immediately as clear error message"
    - kind: fixed
      description: "Pod 404/401 no longer retried 3× with backoff — only transient 5xx/429 errors are retried"
    - kind: fixed
      description: "Admin system logs SSE endpoint now correctly requires admin role"
    - kind: fixed
      description: "Pod log default tail increased from 100 to 500 lines"
    - kind: fixed
      description: "Health dot tooltip hides DB detail from non-admin users"
  artifacthub.io/links: |
    - name: GitHub
      url: https://github.com/infroware/k8s-janus
    - name: Helm Repository
      url: https://infroware.github.io/k8s-janus
keywords:
  - kubernetes
  - k8s-janus
  - rbac
  - access-control
  - security
  - jit
  - zero-trust
  - kubectl
  - operator
  - multi-cluster
  - devops
  - platform-engineering
  - audit
  - terminal
  - pod-access
icon: https://raw.githubusercontent.com/infroware/k8s-janus/main/webui/static/k8s-janus-logo-readme.png
home: https://infroware.github.io/k8s-janus
sources:
  - https://github.com/infroware/k8s-janus
maintainers:
