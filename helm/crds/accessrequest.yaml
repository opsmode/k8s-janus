apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: accessrequests.k8s-janus.opsmode.pro
spec:
  group: k8s-janus.opsmode.pro
  names:
    kind: AccessRequest
    listKind: AccessRequestList
    plural: accessrequests
    singular: accessrequest
    shortNames:
      - ar
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["requester", "reason", "ttlSeconds"]
              properties:
                requester:
                  type: string
                namespace:
                  type: string
                  description: "Deprecated: use namespaces[]"
                namespaces:
                  type: array
                  items:
                    type: string
                  description: "Target namespaces to grant access to"
                reason:
                  type: string
                ttlSeconds:
                  type: integer
                  minimum: 600
                  maximum: 28800
                cluster:
                  type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: ["Pending", "Approved", "Denied", "Expired", "Active", "Revoked", "Failed"]
                approvedBy:
                  type: string
                approvedAt:
                  type: string
                expiresAt:
                  type: string
                revokedAt:
                  type: string
                serviceAccount:
                  type: string
                tokenSecret:
                  type: string
                  description: "Deprecated: use tokenSecrets"
                tokenSecrets:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                  description: "Map of namespace → Secret name"
                message:
                  type: string
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Requester
          type: string
          jsonPath: .spec.requester
        - name: Cluster
          type: string
          jsonPath: .spec.cluster
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Expires
          type: string
          jsonPath: .status.expiresAt
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
